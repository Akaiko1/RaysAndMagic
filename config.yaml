# UgaTaima Game Configuration

# Display settings
display:
  screen_width: 1024
  screen_height: 768
  window_title: "Rays and Magic"
  resizable: true
  fullscreen: true
  disable_vsync_on_mac: true

# Engine settings
engine:
  tps: 120

# Game world settings
world:
  tile_size: 64
  map_width: 50
  map_height: 50

# Movement settings
movement:
  move_speed: 2.0
  rotation_speed: 0.05
  run_multiplier: 2.0   # real-time sprint speed while Shift is held

# Camera/3D rendering settings
camera:
  field_of_view: 1.047197551  # pi/3 (60 degrees in radians)
  view_distance: 1600          # 10 * tile_size

# UI settings
ui:
  spell_input_cooldown: 10
  party_portrait_height: 100
  party_portrait_width: 256   # Fixed portrait width — 4× this = total party row width, centered horizontally
  compass_radius: 20
  damage_blink_frames: 3    # Number of frames to blink red when taking damage

# Character stats and progression
characters:
  # Starting party gold and food
  starting_gold: 500
  starting_food: 50

  # Stat calculation multipliers
  hit_points:
    endurance_multiplier: 2
    level_multiplier: 3

  spell_points:
    level_multiplier: 2

  # Class base attributes
  classes:
    knight:
      might: 15
      intellect: 10
      personality: 10
      endurance: 15
      accuracy: 12
      speed: 10
      luck: 10

    sorcerer:
      might: 8
      intellect: 15
      personality: 12
      endurance: 8
      accuracy: 10
      speed: 10
      luck: 12

    cleric:
      might: 10
      intellect: 12
      personality: 15
      endurance: 12
      accuracy: 8
      speed: 10
      luck: 10

    archer:
      might: 12
      intellect: 10
      personality: 10
      endurance: 10
      accuracy: 15
      speed: 12
      luck: 10

    paladin:
      might: 13
      intellect: 10
      personality: 13
      endurance: 13
      accuracy: 10
      speed: 10
      luck: 11

    druid:
      might: 10
      intellect: 13
      personality: 13
      endurance: 10
      accuracy: 10
      speed: 11
      luck: 11

  # Starting roster (data-driven). class is a class key; name is the display
  # name and (lowercased) the portrait sprite key — falls back to the class
  # sprite if no per-name portrait exists.
  starting_party:
    - { name: Gareth,    class: knight }
    - { name: Lysander,  class: sorcerer }
    - { name: Celestine, class: cleric }
    - { name: Silvelyn,  class: archer }
  # Heroes imprisoned in the mountain prison: they train with the party from the
  # start and join the reserve when freed.
  captives:
    - { name: Auberon, class: paladin }
    - { name: Mirelle, class: druid }


# Monster stats and AI
monster_ai:
  # State timers (in frames, 60fps)
  idle_patrol_timer: 60         # Time before starting patrol from idle (0.5 seconds at 120 TPS)
  patrol_idle_timer: 600        # Time before returning to idle (10 seconds)
  attack_cooldown: 120          # Attack delay duration (1 second at 120 TPS)
  flee_duration: 420            # How long to flee (7 seconds)

  # Behavior chances (0.0 to 1.0)
  idle_to_patrol_chance: 0.1    # 10% chance per frame to start patrolling

  # Movement parameters
  normal_speed_multiplier: 0.5  # Normal movement speed multiplier
  flee_speed_multiplier: 1.5    # Speed multiplier when fleeing

  # Vision and pathfinding
  flee_vision_distance: 60.0    # Vision distance when fleeing (shorter, panicking)

  # AI frequency checks (in frames)
  path_check_frequency: 30      # Check for blocked paths every N frames

  # Detection (distances in tiles, the rest are multipliers)
  default_alert_radius_tiles: 4        # fallback when a monster omits alert_radius
  alert_outside_tether_multiplier: 2.0 # wider detection when lured away from spawn
  alert_los_blocked_multiplier: 0.5    # reduced detection through trees/walls
  disengage_distance_multiplier: 2.0   # lose engagement at detection x this (hysteresis)
  attack_enter_range_fraction: 0.9     # enter attack at <= range x this (exit at > range)

  # Flee cycle: after N consecutive attacks, roll the chance to flee
  flee_after_attacks: 5
  flee_after_attacks_chance: 0.5

# Graphics and rendering
graphics:
  # Raycasting optimization - reduced for 60 FPS performance
  rays_per_screen_width: 4  # ScreenWidth / 4 rays (256 rays instead of 512)

  # Colors (RGB values)
  colors:
    sky: [135, 206, 235]      # Light blue
    ground: [34, 139, 34]     # Green
    forest_bg: [34, 139, 34]  # Forest background

  # Sprite sizes
  sprite:
    placeholder_size: 16
    tree_height_multiplier: 1.5
    tree_width_multiplier: 0.8

  # Distance effects
  brightness_min: 0.3

  # Board-game standees: monsters, NPCs and scenery render as thick wooden
  # tokens standing in the world (monsters turn with their travel direction)
  # instead of camera-facing billboards.
  standee:
    enabled: true
    thickness_tiles: 0.02       # wooden slab thickness (front sticker <-> back sticker)
    turn_speed_deg_per_sec: 270 # how fast monster tokens swivel toward their heading
    npc_spin_deg_per_sec: 12    # showcase spin of NPC/NPC-like tokens (0 = off); scenery never spins
    env_face_deg_per_sec: 20    # scenery tokens slowly turn to face the camera (0 = fixed diagonal)
    min_view_angle_deg: 22      # monster tokens never come closer than this to edge-on (0 = off)

  # Monster rendering (max_sprite_size bounds combat collision scaling only;
  # rendering is uncapped so sprites don't sink at close range)
  monster:
    max_sprite_size: 60
    min_sprite_size: 8
    size_distance_multiplier: 75

  # NPC rendering (larger than monsters for better visibility)
  npc:
    min_sprite_size: 16
    size_distance_multiplier: 150

  # Rising "bubble" particles along the ground edges of impassable billboard
  # tiles (rocks/cliffs — not trees, which already read as solid). Signals which
  # tiles block movement without cluttering the view. Bubbles take the tile's
  # own floor colour so they blend in.
  impassable_aura:
    enabled: true
    radius_tiles: 7        # only tiles within this many tiles of the player
    bubbles_per_edge: 60   # particle columns per walkable-facing edge (full border)
    alpha: 0.5             # base glow strength (0..1)

  # Load-time color key: make stray magenta (left by imperfect sprite background
  # removal) transparent when sprites load. A pixel is keyed when each RGB channel
  # is within `tolerance` of `color`. color [0,0,0]/absent defaults to magenta.
  color_key:
    enabled: true
    color: [255, 0, 255]   # magenta
    tolerance: 60          # per-channel slack for the fully-transparent core
    despill: true          # fringe (semitone) pixels: strip the magenta cast, keep the base tone opaque (don't erase)
