# UgaTaima Game Configuration

# Display settings
display:
  screen_width: 1024
  screen_height: 768
  window_title: "Rays and Magic"
  resizable: true
  fullscreen: true
  disable_vsync_on_mac: true

# Engine settings
engine:
  tps: 120

# Game world settings
world:
  tile_size: 64
  map_width: 50
  map_height: 50

# Movement settings
movement:
  move_speed: 2.0
  rotation_speed: 0.05
  run_multiplier: 2.0   # real-time sprint speed while Shift is held

# Camera/3D rendering settings
camera:
  field_of_view: 1.047197551  # pi/3 (60 degrees in radians)
  view_distance: 3200          # 50 * tile_size

# UI settings
ui:
  spell_input_cooldown: 10
  party_portrait_height: 100
  party_portrait_width: 256   # Fixed portrait width - 4x this = total party row width, centered horizontally
  compass_radius: 20
  damage_blink_frames: 3    # Number of frames to blink red when taking damage

# Character stats and progression
characters:
  # Starting party gold and food
  starting_gold: 500
  starting_food: 5

  # Stat calculation multipliers
  hit_points:
    endurance_multiplier: 2
    level_multiplier: 3

  spell_points:
    level_multiplier: 2

  # Class base attributes
  classes:
    knight:
      might: 15
      intellect: 10
      personality: 10
      endurance: 15
      accuracy: 12
      speed: 10
      luck: 10
      skills: [sword, spear, leather, chain, plate, shield, bodybuilding]
      main_hand: iron_sword

    sorcerer:
      might: 8
      intellect: 15
      personality: 12
      endurance: 8
      accuracy: 10
      speed: 10
      luck: 12
      skills: [dagger, staff, leather, meditation, learning]
      magic:
        - { school: fire,  spells: [torch_light, firebolt] }
        - { school: water, spells: [ice_bolt] }
        - { school: air,   spells: [sparks] }
      main_hand: magic_dagger
      quick_spell: firebolt

    cleric:
      might: 10
      intellect: 12
      personality: 15
      endurance: 12
      accuracy: 8
      speed: 10
      luck: 10
      skills: [mace, chain, shield, meditation, learning]
      magic:
        - { school: body,   spells: [heal_other, harm] }
        - { school: mind,   spells: [mind_blast] }
        - { school: spirit, spells: [spirit_lash] }
      main_hand: holy_mace
      quick_spell: heal_other

    archer:
      might: 12
      intellect: 10
      personality: 10
      endurance: 10
      accuracy: 15
      speed: 12
      luck: 10
      skills: [bow, leather, dagger, disarm_trap, bodybuilding]
      magic:
        - { school: air, spells: [wizard_eye] }
      main_hand: hunting_bow
      quick_spell: wizard_eye

    paladin:
      might: 13
      intellect: 10
      personality: 13
      endurance: 13
      accuracy: 10
      speed: 10
      luck: 11
      skills: [axe, sword, mace, chain, plate, shield, bodybuilding, meditation]
      magic:
        - { school: body, spells: [heal] }
      main_hand: bronze_labrys
      armor: chain_helmet
      quick_spell: heal

    druid:
      might: 10
      intellect: 13
      personality: 13
      endurance: 10
      accuracy: 10
      speed: 11
      luck: 11
      skills: [staff, leather, meditation, bodybuilding, learning]
      magic:
        - { school: water, spells: [ice_bolt] }
        - { school: mind,  spells: [awaken] }
        - { school: earth, spells: [deadly_swarm] }
      main_hand: oak_staff
      quick_spell: awaken

  # Race stat modifiers, ADDITIVE over class base stats. The classic roster is
  # human (baseline, no modifiers).
    thief:
      might: 10
      intellect: 12
      personality: 8
      endurance: 10
      accuracy: 15
      speed: 13
      luck: 12
      skills: [dagger, leather, trapper, sleight_of_hand, meditation, disarm_trap]
      main_hand: magic_dagger
      armor: leather_armor
      quick_trap: cleave_trap

    arms_master:
      might: 15
      intellect: 8
      personality: 8
      endurance: 14
      accuracy: 13
      speed: 12
      luck: 10
      skills: [sword, dagger, axe, spear, bow, mace, staff, shield, leather, bodybuilding, arms_master, dual_wielding]
      skill_start_mastery: { arms_master: expert }
      main_hand: iron_sword

    monk:
      might: 13
      intellect: 8
      personality: 12
      endurance: 11
      accuracy: 11
      speed: 14
      luck: 10
      skills: [learning, iron_body, spiritual_training, martial_arts]
      skill_start_mastery: { learning: expert }
      magic:
        - { school: body,   spells: [heal_other, harm] }
        - { school: mind,   spells: [mind_blast] }
        - { school: spirit, spells: [spirit_lash] }
      main_hand: monk_fists
      quick_spell: mind_blast

  races:
    human: {}
    half_orc:  { might: 3, endurance: 2, intellect: -2, personality: -2, speed: -1 }
    halfling:  { accuracy: 2, speed: 2, luck: 2, might: -3, endurance: -1 }
    dark_elf:  { intellect: 2, speed: 2, accuracy: 1, might: -2, endurance: -2, luck: -1 }
    celestial: { personality: 3, intellect: 1, luck: 1, might: -2, endurance: -2 }

  # Starting roster (data-driven). class is a class key; name is the display
  # name and (lowercased) the portrait sprite key - falls back to the class
  # sprite if no per-name portrait exists.
  starting_party:
    - { name: Gareth,    class: knight }
    - { name: Lysander,  class: sorcerer }
    - { name: Celestine, class: cleric }
    - { name: Silvelyn,  class: archer }
  # Heroes imprisoned in the mountain prison: they train with the party from the
  # start and join the reserve when freed.
  captives:
    - { name: Auberon, class: paladin }
    - { name: Mirelle, class: druid }
  # The second hero set: benched at the tavern from the very start of a new
  # game - same classes as the starting party, stats shifted by race.
  tavern_recruits:
    - { name: Nyra,    class: thief,    race: dark_elf }
    - { name: Grikka,  class: knight,   race: half_orc }
    - { name: Vaelith, class: sorcerer, race: dark_elf }
    - { name: Auralis, class: cleric,   race: celestial }
    - { name: Brinna,  class: archer,   race: halfling }
    - { name: Gwen,    class: arms_master }
    - { name: Sora,    class: monk }


# Monster stats and AI
monster_ai:
  # State timers (in frames, 60fps)
  idle_patrol_timer: 60         # Time before starting patrol from idle (0.5 seconds at 120 TPS)
  patrol_idle_timer: 600        # Time before returning to idle (10 seconds)
  attack_cooldown: 120          # Attack delay duration (1 second at 120 TPS)
  flee_duration: 420            # How long to flee (7 seconds)

  # Behavior chances (0.0 to 1.0)
  idle_to_patrol_chance: 0.1    # 10% chance per frame to start patrolling

  # Movement parameters
  normal_speed_multiplier: 0.5  # Normal movement speed multiplier
  flee_speed_multiplier: 1.5    # Speed multiplier when fleeing

  # Vision and pathfinding
  flee_distance_tiles: 4        # How far a fleeing monster runs before reconsidering

  # AI frequency checks (in frames)
  path_check_frequency: 30      # Check for blocked paths every N frames

  # Detection (distances in tiles, the rest are multipliers)
  default_alert_radius_tiles: 4        # fallback when a monster omits alert_radius
  alert_outside_tether_multiplier: 2.0 # wider detection when lured away from spawn
  alert_los_blocked_multiplier: 0.5    # reduced detection through trees/walls
  disengage_distance_multiplier: 2.0   # lose engagement at detection x this (hysteresis)
  attack_enter_range_fraction: 0.9     # enter attack at <= range x this (exit at > range)

  # Flee cycle: after N consecutive attacks, roll the chance to flee
  flee_after_attacks: 5
  flee_after_attacks_chance: 0.5

# Graphics and rendering
graphics:
  # Raycasting optimization - reduced for 60 FPS performance
  rays_per_screen_width: 1  # One ray per screen pixel: best wall quality, most expensive

  # Colors (RGB values)
  colors:
    sky: [135, 206, 235]      # Light blue
    ground: [34, 139, 34]     # Green
    forest_bg: [34, 139, 34]  # Forest background

  # Distance (in tiles) beyond which a crossed-tree standee degrades to a single
  # camera-facing plane (~4x fewer draws for distant trees; their cross is
  # sub-pixel anyway). Trees only. <=0 disables the LOD (always full crossed standee).
  trees_as_billboards: true
  tree_standee_lod_tiles: 15

  # Sprite sizes
  sprite:
    placeholder_size: 16
    tree_height_multiplier: 1.5
    tree_width_multiplier: 0.8

  # Distance effects
  brightness_min: 0.3

  # Board-game standees: monsters, NPCs and scenery render as thick wooden
  # tokens standing in the world (monsters turn with their travel direction)
  # instead of camera-facing billboards.
  standee:
    enabled: true
    thickness_tiles: 0.02       # wooden slab thickness (front sticker <-> back sticker)
    core_tint: 1.0              # 0 = wood core, 1 = sprite-average core color
    turn_speed_deg_per_sec: 270 # how fast monster tokens swivel toward their heading
    npc_spin_deg_per_sec: 12    # showcase spin of NPC/NPC-like tokens (0 = off); scenery never spins
    env_face_deg_per_sec: 20    # scenery tokens slowly turn to face the camera (0 = fixed diagonal)
    min_view_angle_deg: 22      # monster tokens never come closer than this to edge-on (0 = off)

  # Monster rendering (max_sprite_size bounds combat collision scaling only;
  # rendering is uncapped so sprites don't sink at close range)
  monster:
    max_sprite_size: 60
    min_sprite_size: 8
    size_distance_multiplier: 75

  # NPC rendering (larger than monsters for better visibility)
  npc:
    min_sprite_size: 16
    size_distance_multiplier: 150

  # Rising "bubble" particles along the ground edges of impassable billboard
  # tiles (rocks/cliffs - not trees, which already read as solid). Signals which
  # tiles block movement without cluttering the view. Bubbles take the tile's
  # own floor colour so they blend in.
  impassable_aura:
    enabled: true
    radius_tiles: 7        # only tiles within this many tiles of the player
    bubbles_per_edge: 60   # particle columns per walkable-facing edge (full border)
    alpha: 0.5             # base glow strength (0..1)

  # Load-time color key: make stray magenta (left by imperfect sprite background
  # removal) transparent when sprites load. A pixel is keyed when each RGB channel
  # is within `tolerance` of `color`. color [0,0,0]/absent defaults to magenta.
  color_key:
    enabled: true
    color: [255, 0, 255]   # magenta
    tolerance: 60          # per-channel slack for the fully-transparent core
    despill: true          # fringe (semitone) pixels: strip the magenta cast, keep the base tone opaque (don't erase)
    # Despill is intentionally aggressive (strips ANY magenta hue), which greys
    # out sprites whose purple/magenta is real art. List those here (basenames;
    # animation sheets as "<name>_<animType>") to despill ONLY their edge fringe
    # within edge_despill_radius px, preserving the interior. Curated from the
    # despill audit - extend as new purple art is added.
    edge_despill_radius: 3
    edge_only_despill:
      # Purple/magenta creatures
      - octopus
      - octopus_walking_r
      - medusa
      - medusa_walking_r
      - alien
      - alien_walking_r
      - archmage
      - archmage_walking_r
      - lich
      - lich_walking_r
      - lich_king
      - lich_king_walking_r
      - forest_spider
      - forest_spider_walking_r
      # Sorcerer hero art (purple robes)
      - lysander
      - lysander_full
      - lysander_archmage
      - lysander_archmage_full
      - lysander_lich
      - lysander_lich_full
      # Dark-elf sorcerer hero art (violet skin)
      - vaelith
      - vaelith_full
      - vaelith_archmage
      - vaelith_archmage_full
      - vaelith_lich
      - vaelith_lich_full
      # Environment
      - bonsai_tree
      # Spellbook school tabs (mind/spirit are purple)
      - spellbook_tab_mind
      - spellbook_tab_spirit
      # Spell icons (dark / spirit / mind / arcane)
      - icon_spell_darkness
      - icon_spell_charm
      - icon_spell_psychic_shock
      - icon_spell_spirit_lash
      - icon_spell_disintegrate
      - icon_spell_bind_undead
      - icon_spell_wizard_eye
      - icon_spell_raise_dead
      - icon_spell_awaken
      - icon_spell_darkbolt
      - icon_spell_alien_dark_bolt
      # Item / weapon icons (lich / archmage / wizard themed)
      - icon_item_lich_phylactery
      - icon_item_archmage_robe
      - icon_item_wizard_robe
      - icon_item_lich_king_crown
      - icon_item_lich_card
      - icon_item_archmage_card
      - icon_item_medusa_card
      - icon_item_soul_phylactery_gem
      - icon_weapon_book_of_darkness
      - icon_weapon_battle_staff
      - icon_weapon_archmage_staff
