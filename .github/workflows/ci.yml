name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install ebiten dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxcursor-dev libxi-dev \
            libxinerama-dev libxrandr-dev libxxf86vm-dev libasound2-dev \
            pkg-config xvfb

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: Tests with race detector
        # Ebiten init opens a GLFW window at package init time, which fails on
        # headless CI without DISPLAY. xvfb-run provides a virtual framebuffer
        # so package init succeeds and tests can run.
        run: xvfb-run --auto-servernum go test -race -timeout 5m ./...
