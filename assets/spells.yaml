    is_projectile: true
    is_utility: false

    # Projectile physics (tile-based units)
    physics:
      speed_tiles: 10.0
      range_tiles: 10.0
      collision_size_tiles: 0.5

    # Visual appearance
    graphics:
      max_size: 48
      min_size: 3
      base_size: 12
      color: [140, 80, 200]   # Violet shadow

  alien_dark_bolt:
