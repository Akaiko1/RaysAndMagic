# UgaTaima Spell Configuration
# This file contains ALL spell-related configuration including:
# - Spell definitions (cost, school, level, effects)
# - Projectile physics (speed in tiles/sec, range in tiles)
# - Visual appearance (colors, sizes, effects)
#
# DAMAGE NOTE: offensive spell damage is NOT specified here. It is derived
# from spell_points_cost as: base = cost × spells.SpellDamagePerSP (default 3).
# Designer-facing knob is therefore spell_points_cost — to make a spell hit
# harder, raise its cost. Healing spells use heal_amount explicitly.

# Add new spells here without needing any code changes!

# =============================================================================
# SPELL DEFINITIONS
# =============================================================================
spells:
  fireball:
    # Basic spell properties
    name: "Fireball"
    description: "Hurls a powerful ball of fire that explodes on impact, splashing nearby foes"
    school: "fire"
    level: 1
    spell_points_cost: 4
    duration: 0                # 0 for instant spells
    aoe_radius_tiles: 2.0      # splash damages all monsters within 2 tiles of the hit
    projectile_size: 16
    is_projectile: true
    is_utility: false

    # Projectile physics (tile-based units)
    physics:
      speed_tiles: 8.0           # Speed in tiles per second
      range_tiles: 12.0          # Maximum range in tiles
      collision_size_tiles: 2.0  # Size for collision detection in tiles (min 0.5)

    # Visual appearance
    graphics:
      max_size: 110
      min_size: 4
      base_size: 28
      color: [255, 50, 0]      # Deep red

  firebolt:
    # Basic spell properties
    name: "Fire Bolt"
    description: "Launches a small, fast bolt of fire"
    school: "fire"
    level: 1
    spell_points_cost: 1
    duration: 0
    projectile_size: 10
    is_projectile: true
    is_utility: false

    # Projectile physics (tile-based units)
    physics:
      speed_tiles: 12.0          # Faster than fireball
      range_tiles: 8.0           # Shorter range
      collision_size_tiles: 0.5  # Minimum collision size (0.5 tiles)

    # Visual appearance
    graphics:
      max_size: 48
      min_size: 3
      base_size: 12
      color: [255, 255, 100]   # Bright yellow-orange

  darkbolt:
    # Basic spell properties
    name: "Dark Bolt"
    description: "Launches a bolt of shadow energy"
    school: "dark"
    level: 1
    spell_points_cost: 3
    duration: 0
    projectile_size: 12
    is_projectile: true
    is_utility: false

    # Projectile physics (tile-based units)
    physics:
      speed_tiles: 10.0
      range_tiles: 10.0
      collision_size_tiles: 0.5

    # Visual appearance
    graphics:
      max_size: 48
      min_size: 3
      base_size: 12
      color: [140, 80, 200]   # Violet shadow

  alien_dark_bolt:
    # Basic spell properties
    name: "Alien Dark Bolt"
    description: "A concentrated bolt of void energy"
    school: "dark"
    level: 2
    spell_points_cost: 2
    duration: 0
    disintegrate_chance: 0.01
    projectile_size: 12
    is_projectile: true
    is_utility: false

    # Projectile physics (tile-based units)
    physics:
      speed_tiles: 10.0
      range_tiles: 4.0
      collision_size_tiles: 0.5

    # Visual appearance
    graphics:
      max_size: 48
      min_size: 3
      base_size: 12
      color: [120, 60, 160]   # Deep violet

  ice_bolt:
    # Basic spell properties
    name: "Ice Bolt"
    description: "Launches a chilling bolt of ice"
    school: "water"
    level: 1
    spell_points_cost: 2
    duration: 0
    projectile_size: 12
    is_projectile: true
    is_utility: false

    # Projectile physics (tile-based units)
    physics:
      speed_tiles: 8.0           # Same speed as fireball
      range_tiles: 8.0           # Medium range
      collision_size_tiles: 0.5  # Minimum collision size (0.5 tiles)

    # Visual appearance
    graphics:
      max_size: 50
      min_size: 3
      base_size: 12
      color: [150, 200, 255]   # Light blue/cyan

  lightning:
    # Basic spell properties
    name: "Lightning Bolt"
    description: "Strikes the target with a bolt of lightning"
    school: "air"
    level: 2
    spell_points_cost: 8
    duration: 0
    projectile_size: 8
    is_projectile: true
    is_utility: false

    # Projectile physics (tile-based units)
    physics:
      speed_tiles: 20.0          # Very fast
      range_tiles: 6.0           # Short range but high damage
      collision_size_tiles: 0.5  # Minimum collision size (0.5 tiles)

    # Visual appearance
    graphics:
      max_size: 40
      min_size: 2
      base_size: 10
      color: [100, 150, 255]   # Bright blue

  ray_of_light:
    # Basic spell properties
    name: "Ray of Light"
    description: "A searing beam of holy light that scales with both Intellect and Personality"
    school: "light"
    level: 4
    spell_points_cost: 8
    duration: 0
    projectile_size: 8
    is_projectile: true
    is_utility: false
    damage_cost_multiplier: 2      # base damage = cost × SpellDamagePerSP × 2
    scales_with_personality: true  # adds Personality/divisor on top of Intellect/divisor

    # Projectile physics (tile-based units)
    physics:
      speed_tiles: 22.0          # very fast beam
      range_tiles: 8.0
      collision_size_tiles: 0.5

    # Visual appearance
    graphics:
      max_size: 44
      min_size: 2
      base_size: 12
      color: [255, 245, 180]   # warm golden light

  darkness:
    # Basic spell properties
    name: "Darkness"
    description: "A shroud of crushing dark that stuns every foe within 5 tiles"
    school: "dark"
    level: 5
    spell_points_cost: 20
    duration: 0
    is_projectile: false
    is_utility: true
    # AoE-stun effect (no damage): stuns all monsters within the radius.
    stun_radius_tiles: 5.0
    stun_duration_seconds: 5
    stun_duration_turns: 3

  disintegrate:
    # Basic spell properties
    name: "Disintegrate"
    description: "Unmakes a foe — 15% chance to instantly slay it. No effect on undead or dragons."
    school: "dark"
    level: 5
    spell_points_cost: 10
    duration: 0
    projectile_size: 10
    is_projectile: true
    is_utility: false
    deals_no_damage: true        # only the instakill roll matters
    disintegrate_chance: 0.15    # 15% instant kill on hit (undead/dragons immune)

    # Projectile physics (tile-based units)
    physics:
      speed_tiles: 16.0
      range_tiles: 7.0
      collision_size_tiles: 0.5

    # Visual appearance
    graphics:
      max_size: 40
      min_size: 2
      base_size: 12
      color: [170, 60, 200]   # violet unmaking

  day_of_the_gods:
    name: "Day of the Gods"
    description: "Blesses the party with +50% resistance to all damage for 5 minutes"
    school: "light"
    level: 7
    spell_points_cost: 20
    duration: 300              # 5 minutes
    is_projectile: false
    is_utility: true
    resist_buff_pct: 50        # -50% to all incoming party damage while active
    status_icon: "day_of_the_gods"   # HUD: status_day_of_the_gods if present, else the spell icon

  hour_of_power:
    name: "Hour of Power"
    description: "For 10 minutes the party deals +15 damage and takes 5 less from every hit"
    school: "light"
    level: 8
    spell_points_cost: 18
    duration: 600              # 10 minutes
    is_projectile: false
    is_utility: true
    outgoing_damage_bonus: 15
    incoming_damage_reduction: 5
    status_icon: "hour_of_power"   # HUD: status_hour_of_power if present, else the spell icon

  bind_undead:
    name: "Bind Undead"
    description: "Binds an undead to your will for 5 minutes — it fights other monsters. No effect on the living. It perishes when you leave the area."
    school: "dark"
    level: 6
    spell_points_cost: 8
    duration: 0
    projectile_size: 8
    is_projectile: true
    is_utility: false
    deals_no_damage: true          # the bind, not damage, is the effect
    charm: true
    charm_duration_seconds: 300    # 5 minutes (real-time)

    # Projectile physics (tile-based units)
    physics:
      speed_tiles: 16.0
      range_tiles: 7.0
      collision_size_tiles: 0.5

    # Visual appearance
    graphics:
      max_size: 36
      min_size: 2
      base_size: 12
      color: [180, 120, 220]   # pale binding light

  resurrect:
    name: "Resurrect"
    description: "Restores a fallen ally to full health — even one who has been eradicated"
    school: "light"
    level: 7
    spell_points_cost: 16
    duration: 0
    is_projectile: false
    is_utility: true
    revive: true
    full_heal: true

  heal:
    # Basic spell properties
    name: "First Aid"
    description: "Restores health to the caster"
    school: "body"
    level: 1
    spell_points_cost: 4
    duration: 0
    heal_amount: 15
    is_projectile: false
    is_utility: true
    target_self: true
    message: "You feel renewed!"

    # No physics or graphics needed - utility spell

  heal_other:
    # Basic spell properties
    name: "Heal"
    description: "Restores health to another party member"
    school: "body"
    level: 2
    spell_points_cost: 4
    duration: 0
    heal_amount: 20
    is_projectile: false
    is_utility: true
    target_self: false
    message: "Healing energy flows to your ally!"

    # No physics or graphics needed - utility spell

  torch_light:
    # Basic spell properties
    name: "Torch Light"
    description: "Creates a magical light that illuminates the surroundings"
    school: "fire"
    level: 1
    spell_points_cost: 1
    duration: 300              # 5 minutes
    is_projectile: false
    is_utility: true
    status_icon: "torch"
    vision_bonus: 50.0
    message: "A magical light illuminates the area!"

    # No physics or graphics needed - utility spell

  bless:
    # Basic spell properties
    name: "Bless"
    description: "Blesses the party with divine protection (+10 to all stats)"
    school: "spirit"
    level: 2
    spell_points_cost: 15
    duration: 300              # 5 minutes
    stat_bonus: 10             # +10 to all stats
    is_projectile: false
    is_utility: true
    status_icon: "bless"
    message: "The party feels blessed! (+10 to all stats)"

    # No physics or graphics needed - utility spell

  wizard_eye:
    # Basic spell properties
    name: "Wizard Eye"
    description: "Extends your vision beyond normal limits"
    school: "air"
    level: 4
    spell_points_cost: 8
    duration: 300              # 5 minutes
    vision_bonus: 100.0
    is_projectile: false
    is_utility: true
    status_icon: "eye"
    message: "Your vision extends beyond normal limits!"

    # No physics or graphics needed - utility spell

  awaken:
    # Basic spell properties
    name: "Awaken"
    description: "Rouses every unconscious party member back to 1 HP"
    school: "mind"
    level: 2
    spell_points_cost: 4
    duration: 0
    is_projectile: false
    is_utility: true
    awaken: true
    message: "Awakening energy spreads through the party!"

    # No physics or graphics needed - utility spell

  walk_on_water:
    # Basic spell properties
    name: "Walk on Water"
    description: "Allows the party to walk on water surfaces"
    school: "water"
    level: 3
    spell_points_cost: 6
    duration: 180              # 3 minutes
    is_projectile: false
    is_utility: true
    status_icon: "water_walk"
    water_walk: true
    message: "The party gains the ability to walk on water!"

    # No physics or graphics needed - utility spell

  water_breathing:
    # Basic spell properties
    name: "Water Breathing"
    description: "Allows underwater exploration by enabling breathing underwater"
    school: "water"
    level: 3
    spell_points_cost: 10
    duration: 600              # 10 minutes
    is_projectile: false
    is_utility: true
    status_icon: "water_breathing"
    water_breathing: true
    message: "You can now breathe underwater!"

    # No physics or graphics needed - utility spell

# =============================================================================
# SPELL ADDING INSTRUCTIONS
# =============================================================================
# To add a new spell:
# 1. Add a new entry under 'spells:' with a unique key (spell ID)
# 2. Fill in all the basic spell properties
# 3. For projectile spells (is_projectile: true):
#    - Add 'physics:' section with:
#      - speed_tiles: Speed in tiles per second
#      - range_tiles: Maximum range in tiles
#      - collision_size_tiles: Collision size in tiles (min 0.5)
#    - Add 'graphics:' section with max_size, min_size, base_size, color
# 4. For utility spells (is_utility: true):
#    - Add effect properties like heal_amount, vision_bonus, stat_bonus, etc.
#    - Add custom message
#    - No physics or graphics sections needed
# 5. Build and test: go run .
#
# Example new projectile spell:
# ice_shard:
#   name: "Ice Shard"
#   description: "Launches a sharp shard of ice"
#   school: "water"
#   level: 2
#   spell_points_cost: 6
#   duration: 0
#   projectile_size: 12
#   is_projectile: true
#   is_utility: false
#   physics:
#     speed_tiles: 10.0          # 10 tiles per second
#     range_tiles: 10.0          # 10 tile range
#     collision_size_tiles: 0.5  # 0.5 tiles (minimum)
#   graphics:
#     max_size: 50
#     min_size: 3
#     base_size: 12
#     color: [100, 200, 255]  # Light blue
