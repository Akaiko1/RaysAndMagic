# Armor sets: items carrying the same `set:` key power a party-wide bonus once
# pieces_required of them are equipped on ONE character. Bonuses use the same
# attribute vocabulary as items (bonus_*) plus set-only effects.
item_sets:
  padded:
    name: "Pit Fighter's Quilt"
    pieces_required: 4
    stun_duration_pct: -50   # quilting soaks the blow: stuns on the wearer last half as long
  ringmail:
    name: "Coliseum Ringmail"
    pieces_required: 4
    bonus_endurance: 10
  # Clock tower sets (5 pieces each, sold by the Clockmaker for clock hands).
  # Each set has a distinct identity - the scout, the duelist, the juggernaut.
  cogleather:
    name: "Cogleather Rig"
    pieces_required: 5
    bonus_speed: 12
    bonus_luck: 6
  chainwork:
    name: "Chainwork Regalia"
    pieces_required: 5
    bonus_accuracy: 10
    bonus_endurance: 8
  clockplate:
    name: "Clockplate Bulwark"
    pieces_required: 5
    bonus_might: 12
    stun_duration_pct: -50

items:
  # Armor Endurance AC scaling is category-wide by design:
  # leather = END/10, chain = END/7, plate = END/5.
  # Cloth, shields, and future non-listed armor categories stay flat AC.
  leather_armor:
    name: "Leather Armor"
    type: "armor"
    armor_category: "leather"
    description: "Simple leather protection"
    flavor: "Worn smooth by a hundred roads; it smells of rain and smoke."
    equip_slot: "armor"
    armor_class_base: 2
    endurance_scaling_divisor: 10
    rarity: "common"
    value: 25

  leather_helmet:
    name: "Leather Helmet"
    type: "armor"
    armor_category: "leather"
    description: "Simple leather cap offering light protection"
    flavor: "A scuffed browband that keeps splinters - and doubts - at bay."
    equip_slot: "helmet"
    armor_class_base: 1
    endurance_scaling_divisor: 10
    rarity: "common"
    value: 15

  leather_pants:
    name: "Leather Pants"
    type: "armor"
    armor_category: "leather"
    description: "Reinforced leather pants with minimal protection"
    flavor: "Stitched at dusk; they creak like an old saddle."
    equip_slot: "boots"
    armor_class_base: 1
    endurance_scaling_divisor: 10
    rarity: "common"
    value: 18

  chain_armor:
    name: "Chain Armor"
    type: "armor"
    armor_category: "chain"
    description: "Interlocked rings that offer solid protection"
    flavor: "Cold links that rattle with every breath."
    equip_slot: "armor"
    armor_class_base: 4
    endurance_scaling_divisor: 7
    rarity: "uncommon"
    value: 85

  chain_helmet:
    name: "Chain Coif"
    type: "armor"
    armor_category: "chain"
    description: "A hood of chainmail for sturdy defense"
    flavor: "A weave of steel that muffles the world."
    equip_slot: "helmet"
    armor_class_base: 3
    endurance_scaling_divisor: 7
    rarity: "uncommon"
    value: 55

  chain_pants:
