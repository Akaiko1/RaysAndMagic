items:
  leather_armor:
    name: "Leather Armor"
    type: "armor"
    armor_category: "leather"
    description: "Simple leather protection"
    flavor: "Worn smooth by a hundred roads; it smells of rain and smoke."
    equip_slot: "armor"
    armor_class_base: 2
    endurance_scaling_divisor: 5
    rarity: "common"
    value: 25

  leather_helmet:
    name: "Leather Helmet"
    type: "armor"
    armor_category: "leather"
    description: "Simple leather cap offering light protection"
    flavor: "A scuffed browband that keeps splinters—and doubts—at bay."
    equip_slot: "helmet"
    armor_class_base: 1
    endurance_scaling_divisor: 6
    rarity: "common"
    value: 15

  leather_pants:
    name: "Leather Pants"
    type: "armor"
    armor_category: "leather"
    description: "Reinforced leather pants with minimal protection"
    flavor: "Stitched at dusk; they creak like an old saddle."
    equip_slot: "boots"
    armor_class_base: 1
    endurance_scaling_divisor: 6
    rarity: "common"
    value: 18

  chain_armor:
    name: "Chain Armor"
    type: "armor"
    armor_category: "chain"
    description: "Interlocked rings that offer solid protection"
    flavor: "Cold links that rattle with every breath."
    equip_slot: "armor"
    armor_class_base: 4
    endurance_scaling_divisor: 5
    rarity: "uncommon"
    value: 85

  chain_helmet:
    name: "Chain Coif"
    type: "armor"
    armor_category: "chain"
    description: "A hood of chainmail for sturdy defense"
    flavor: "A weave of steel that muffles the world."
    equip_slot: "helmet"
    armor_class_base: 3
    endurance_scaling_divisor: 6
    rarity: "uncommon"
    value: 55

  chain_pants:
    name: "Chain Leggings"
    type: "armor"
    armor_category: "chain"
    description: "Chainmail leggings for reliable protection"
    flavor: "Weighty rings that drag the dust at your feet."
    equip_slot: "boots"
    armor_class_base: 3
    endurance_scaling_divisor: 6
    rarity: "uncommon"
    value: 60

  health_potion:
    name: "Health Potion"
    type: "consumable"
    description: "Restores health"
    flavor: "Sunset caught in glass; warm as a hearth."
    heal_base: 25
    heal_endurance_divisor: 4
    rarity: "common"
    value: 50

  revival_potion:
    name: "Revival Potion"
    type: "consumable"
    description: "A potent draught that restores breath and vigor"
    flavor: "A spark in a bottle; dawn for the fallen."
    revive: true
    full_heal: true
    rarity: "rare"
    value: 500

  magic_ring:
    name: "Magic Ring"
    type: "accessory"
    description: "A magical ring that enhances spell power and mana"
    flavor: "A thin whisper of power circling a finger."
    equip_slot: "ring"
    intellect_scaling_divisor: 6
    personality_scaling_divisor: 8
    rarity: "rare"
    value: 200

  wizard_robe:
    name: "Wizard Robes"
    type: "armor"
    armor_category: "cloth"
    description: "Silken robes embroidered with arcane runes"
    flavor: "Threads of midnight stitched with quiet power."
    equip_slot: "armor"
    armor_class_base: 1
    bonus_intellect: 10
    bonus_personality: 10
    rarity: "rare"
    value: 500

  iron_armor:
    name: "Iron Armor"
    type: "armor"
    armor_category: "plate"
    description: "Sturdy iron plate providing solid protection"
    flavor: "Iron plates that sing quietly with every step."
    equip_slot: "armor"
    armor_class_base: 4
    endurance_scaling_divisor: 4
    rarity: "uncommon"
    value: 120

  iron_helmet:
    name: "Iron Helmet"
    type: "armor"
    armor_category: "plate"
    description: "A solid iron helm that shrugs off blows"
    flavor: "A heavy crown of war."
    equip_slot: "helmet"
    armor_class_base: 4
    endurance_scaling_divisor: 4
    rarity: "uncommon"
    value: 90

  iron_pants:
    name: "Iron Greaves"
    type: "armor"
    armor_category: "plate"
    description: "Heavy greaves built to take punishment"
    flavor: "Each step lands with purpose."
    equip_slot: "boots"
    armor_class_base: 4
    endurance_scaling_divisor: 4
    rarity: "uncommon"
    value: 95

  dead_branch:
    name: "Dead Branch"
    type: "consumable"
    description: "A brittle branch humming with chaotic energy"
    flavor: "Brittle with whispers; it remembers storms."
    summon_distance_tiles: 2
    rarity: "uncommon"
    value: 80

  belt_of_strength:
    name: "Belt of Strength"
    type: "accessory"
    description: "A stout belt that steadies the core"
    flavor: "Cinched tight, it lends the courage of oaks."
    equip_slot: "belt"
    bonus_might: 5
    rarity: "rare"
    value: 300

  belt_of_speed:
    name: "Belt of Speed"
    type: "accessory"
    description: "A light belt that quickens movement"
    flavor: "Blue sparks crawl along the buckle when danger nears."
    equip_slot: "belt"
    bonus_speed: 15
    rarity: "rare"
    value: 650

  lucky_paw:
    name: "Lucky Paw"
    type: "accessory"
    description: "An amulet said to turn fate's gaze"
    flavor: "Warm to the touch; chance purrs in your pocket."
    equip_slot: "amulet"
    bonus_luck: 40
    rarity: "legendary"
    value: 800

  medusa_card:
    name: "Medusa Card"
    type: "trinket"
    description: "A rare monster card prized by collectors"
    flavor: "A stamped parchment card showing a glowing sea medusa."
    rarity: "rare"
    value: 500

  black_dragon_statuette:
    name: "Black Dragon Statuette"
    type: "quest"
    description: "An obsidian statuette of the black desert dragon"
    flavor: "Cold stone holds the shape of a sleeping wyrm."
    rarity: "legendary"

  red_dragon_statuette:
    name: "Red Dragon Statuette"
    type: "quest"
    description: "A ruby-red statuette of the red dragon"
    flavor: "Its scales catch the light like banked embers."
    rarity: "legendary"

  green_dragon_statuette:
    name: "Green Dragon Statuette"
    type: "quest"
    description: "An emerald-green statuette of the green dragon"
    flavor: "A small serpent of stone and jungle venom."
    rarity: "legendary"

  gold_dragon_statuette:
    name: "Gold Dragon Statuette"
    type: "quest"
    description: "A golden statuette of the storm dragon"
    flavor: "Tiny wings of hammered gold seem ready to stir."
    rarity: "legendary"

  ancient_linen_wrap:
    name: "Ancient Linen Wrap"
    type: "trinket"
    description: "Dusty embalming cloth clasped with a small seal"
    flavor: "Dry as old prayers, but still strangely intact."
    rarity: "common"
    value: 120

  scarab_amulet:
    name: "Scarab Amulet"
    type: "accessory"
    description: "A turquoise scarab charm from the pyramid crypts"
    flavor: "Its wings click softly when danger nears."
    equip_slot: "amulet"
    bonus_luck: 15
    bonus_endurance: 5
    rarity: "uncommon"
    value: 550

  minotaur_horn:
    name: "Minotaur Horn"
    type: "trinket"
    description: "A cracked horn bound with a bronze ring"
    flavor: "Heavy, sharp, and still warm near the base."
    rarity: "uncommon"
    value: 420

  isis_feather:
    name: "Isis Feather"
    type: "accessory"
    description: "A blue-gold feather charm from an Isis guardian"
    flavor: "It moves as if touched by a wind you cannot feel."
    equip_slot: "cloak"
    bonus_personality: 8
    bonus_speed: 8
    rarity: "rare"
    value: 800

  serpent_diadem:
    name: "Serpent Diadem"
    type: "accessory"
    description: "A golden cobra diadem set with a blue gem"
    flavor: "The cobra's eyes seem to follow every spell you cast."
    equip_slot: "helmet"
    bonus_intellect: 10
    bonus_personality: 5
    rarity: "rare"
    value: 950

  revenant_blade_shard:
    name: "Revenant Blade Shard"
    type: "trinket"
    description: "A broken spectral blade fragment"
    flavor: "Green light crawls along the edge, searching for a hand."
    rarity: "uncommon"
    value: 520

  grave_knight_sigil:
    name: "Grave Knight Sigil"
    type: "accessory"
    description: "A black iron badge from an undead knightly order"
    flavor: "The skull mark is worn smooth by armored fingers."
    equip_slot: "amulet"
    bonus_might: 8
    bonus_endurance: 8
    rarity: "rare"
    value: 850

  lich_king_crown:
    name: "Lich King Crown"
    type: "accessory"
    description: "A dark spiked crown with a bound soul gem"
    flavor: "A whisper offers counsel from inside the emerald stone."
    equip_slot: "helmet"
    bonus_intellect: 18
    bonus_personality: 8
    rarity: "legendary"
    value: 1800

  soul_phylactery_gem:
    name: "Soul Phylactery Gem"
    type: "trinket"
    description: "A green-violet crystal vessel in a bone setting"
    flavor: "Something inside taps once, then goes silent."
    rarity: "legendary"
    value: 1300

  world_map:
    name: "World Map"
    type: "quest"
    description: "A hand-drawn map showing the surrounding lands"
    flavor: "Ink and charcoal sketch the known roads and rumors."
    opens_map: true
    rarity: "common"

  archmage_robe:
    name: "Archmage Robe"
    type: "armor"
    armor_category: "cloth"
    description: "Master-woven robes humming with arcane power"
    flavor: "Violet silk that drinks the candlelight."
    equip_slot: "armor"
    armor_class_base: 10
    bonus_intellect: 15
    bonus_personality: 15
    rarity: "legendary"
    value: 900

  golden_armor:
    name: "Golden Armor"
    type: "armor"
    armor_category: "plate"
    description: "Gilded plate fit for a dragon's hoard"
    flavor: "Heavy gold that turns blades and heads alike."
    equip_slot: "armor"
    armor_class_base: 6
    endurance_scaling_divisor: 4
    rarity: "legendary"
    value: 1500

  elven_shield:
    name: "Elven Shield"
    type: "armor"
    armor_category: "shield"
    description: "A light leaf-etched shield of elven make"
    flavor: "Lighter than it looks; quick to raise."
    equip_slot: "offhand"
    armor_class_base: 3
    bonus_speed: 5
    rarity: "uncommon"
    value: 400

  accuracy_talisman:
    name: "Accuracy Talisman"
    type: "accessory"
    description: "A compass-like charm that steadies the aim"
    flavor: "Its needle always finds the mark."
    equip_slot: "amulet"
    bonus_accuracy: 30
    rarity: "uncommon"
    value: 600

  puma_claw:
    name: "Puma Claw"
    type: "accessory"
    description: "A predator's claw strung on a leather cord"
    flavor: "Still sharp; still hungry."
    equip_slot: "amulet"
    bonus_speed: 10
    bonus_might: 5
    rarity: "uncommon"
    value: 500

  granite:
    name: "Granite Chunk"
    type: "trinket"
    description: "A heavy lump of mountain stone"
    flavor: "Worthless to most; ballast to a troll."
    rarity: "common"
    value: 150

  emerald:
    name: "Emerald"
    type: "trinket"
    description: "A flawless green gemstone"
    flavor: "Green fire caught in glass."
    rarity: "rare"
    value: 700

  ruby:
    name: "Ruby"
    type: "trinket"
    description: "A deep-red gem that glows like banked coals"
    flavor: "A drop of dragonfire turned to stone."
    rarity: "rare"
    value: 800

  diamond:
    name: "Diamond"
    type: "trinket"
    description: "A brilliant, flawless diamond"
    flavor: "A king's ransom in a single facet."
    rarity: "legendary"
    value: 1200

  puma_card:
    name: "Puma Card"
    type: "trinket"
    description: "A rare monster card prized by collectors"
    flavor: "A stamped card showing a prowling highland puma."
    rarity: "rare"
    value: 500

  archmage_card:
    name: "Archmage Card"
    type: "trinket"
    description: "A rare monster card prized by collectors"
    flavor: "A stamped card showing a robed highland archmage."
    rarity: "rare"
    value: 500

  lich_card:
    name: "Lich Card"
    type: "trinket"
    description: "A rare monster card prized by collectors"
    flavor: "A stamped card showing a crowned lich wreathed in shadow."
    rarity: "rare"
    value: 500

  lich_phylactery:
    name: "Lich Phylactery"
    type: "quest"
    description: "The soul-vessel of a lich, cold to the touch"
    flavor: "Something inside it still hates you."
    rarity: "legendary"
    value: 0
    promotes_lich: true   # using it offers a compatible party member the path of the Lich

  # --- Gauntlets (hands slot) — first items to fill the previously-empty
  # gauntlets slot. Armor-type, so they add to total armor class and gate on the
  # matching armor skill; "cloth" is universally wearable (caster-friendly).
  goblin_hide_gauntlets:
    name: "Goblin Hide Gauntlets"
    type: "armor"
    armor_category: "leather"
    description: "Crude hide gloves stiffened with bone splints"
    flavor: "They still reek of the warren that skinned them."
    equip_slot: "gauntlets"
    armor_class_base: 1
    endurance_scaling_divisor: 7
    bonus_accuracy: 3
    rarity: "common"
    value: 35

  tideclasp_gauntlets:
    name: "Tideclasp Gauntlets"
    type: "armor"
    armor_category: "chain"
    description: "Barnacled chain gloves that never lose their grip"
    flavor: "Cold seawater still beads between the links."
    equip_slot: "gauntlets"
    armor_class_base: 2
    endurance_scaling_divisor: 6
    bonus_speed: 6
    rarity: "uncommon"
    value: 240

  bearpaw_gauntlets:
    name: "Bearpaw Gauntlets"
    type: "armor"
    armor_category: "plate"
    description: "Massive plated gauntlets clawed like a bear's paw"
    flavor: "Make a fist and the whole room takes a step back."
    equip_slot: "gauntlets"
    armor_class_base: 3
    bonus_might: 4
    rarity: "rare"
    value: 360

  serpentscale_gauntlets:
    name: "Serpentscale Gauntlets"
    type: "armor"
    armor_category: "cloth"
    description: "Supple scaled gloves that channel arcane focus"
    flavor: "The scales shift like a snake dreaming of stone."
    equip_slot: "gauntlets"
    armor_class_base: 1
    intellect_scaling_divisor: 8
    bonus_personality: 3
    rarity: "rare"
    value: 380

  # --- Cloak (second cloak in the game, after isis_feather) ---
  direpelt_cloak:
    name: "Direpelt Cloak"
    type: "accessory"
    description: "A heavy dire-wolf pelt worn across the shoulders"
    flavor: "Still warm, as if the beast only just stopped running."
    equip_slot: "cloak"
    bonus_endurance: 6
    bonus_speed: 5
    rarity: "rare"
    value: 430

  # --- Culverts (Seabright sewers) loot ---
  ratskin_boots:
    name: "Ratskin Boots"
    type: "armor"
    armor_category: "leather"
    description: "Soft sewer-rat hide boots"
    flavor: "Sewer-rat hide soles; silent on wet stone, and they keep the damp out."
    equip_slot: "boots"
    armor_class_base: 2
    endurance_scaling_divisor: 6
    rarity: "common"
    value: 45

  plague_rat_tail:
    name: "Plague Rat Tail"
    type: "trinket"
    description: "A severed rat tail, sold by weight"
    flavor: "A severed tail sold by weight to alchemists who ask no questions."
    rarity: "uncommon"
    value: 120

  batwing_cloak:
    name: "Batwing Cloak"
    type: "accessory"
    description: "A cloak of stitched bat-wing membrane"
    flavor: "Leathery membrane that drinks the lantern-light; you move quieter under it."
    equip_slot: "cloak"
    bonus_speed: 8
    rarity: "uncommon"
    value: 300

  sonar_pendant:
    name: "Sonar Pendant"
    type: "accessory"
    description: "A bat-earbone pendant that sharpens the senses"
    flavor: "A bat's earbone on a thong; the world feels a half-step slower, easier to read."
    equip_slot: "amulet"
    bonus_speed: 5
    bonus_luck: 5
    rarity: "uncommon"
    value: 280

  echo_membrane:
    name: "Echo Membrane"
    type: "trinket"
    description: "A taut sliver of bat-ear"
    flavor: "A taut sliver of bat-ear that hums at sounds you cannot hear."
    rarity: "uncommon"
    value: 140

  thief_bug_card:
    name: "Thief Bug Card"
    type: "trinket"
    description: "A rare monster card prized by collectors"
    flavor: "A stamped card of a thief bug mid-skitter, mandibles wide."
    rarity: "rare"
    value: 500

  thief_king_signet:
    name: "Thief King Signet"
    type: "accessory"
    description: "A stolen signet ring crowned with a golden beetle"
    flavor: "The bug's stolen signet; fortune favours whoever wears a thief's crown."
    equip_slot: "ring"
    bonus_luck: 12
    rarity: "rare"
    value: 700

  # Golden Thief Bug boss drop (1%): a cloth breastplate set with the golden card.
  # Cloth ⇒ no skill requirement and no endurance scaling (flat AC). Its real worth
  # is the resistances map — every non-physical school at 100 (full immunity), the
  # same per-element model monsters use. Physical is intentionally omitted.
  golden_thiefbug_carapace:
    name: "Golden Thief Bug Carapace"
    type: "armor"
    armor_category: "cloth"
    description: "A gilded breastplate forged around a Golden Thief Bug card"
    flavor: "A breastplate forged around the golden thief-bug card itself — spellfire, frost, venom and shadow all slide off the gilded shell."
    equip_slot: "armor"
    armor_class_base: 10
    rarity: "legendary"
    value: 8000
    resistances:
      fire: 100
      water: 100
      air: 100
      earth: 100
      body: 100
      mind: 100
      spirit: 100
      light: 100
      dark: 100
