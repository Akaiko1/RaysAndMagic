    damage: 6
    range: 1  # 1 tile reach for mace
    bonus_stat: "Might"
    crit_chance: 8
    damage_type: "light"
    rarity: "uncommon"
    value: 150

    # Melee-specific configuration
    melee:
      arc_type: 2
      animation_frames: 10  # Slower, heavier swing
      hit_delay: 4      # Delayed impact for heavy weapon

    # Visual effects for slash animation
    graphics:
      slash_color: [255, 255, 100]  # Holy golden flash
