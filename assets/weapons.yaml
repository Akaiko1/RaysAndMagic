# UgaTaima Weapons Configuration
# Complete weapon definitions with embedded physics and graphics configurations
#
# Physics units (for projectile weapons):
#   speed_tiles: Speed in tiles per second
#   range_tiles: Maximum range in tiles
#   collision_size_tiles: Collision box size in tiles (min 0.5)

weapons:
  iron_sword:
    # Basic weapon properties
    name: "Iron Sword"
    description: "A sturdy iron sword favored by knights"
    category: "sword"
    damage: 8
    range: 1  # 1 tile reach for standard sword
    bonus_stat: "Might"
    crit_chance: 10
    rarity: "common"
    value: 100

    # Melee-specific configuration
    melee:
      arc_type: 2
      animation_frames: 8  # Brief slash animation
      hit_delay: 2      # Frames before damage applies

    # Visual effects for slash animation
    graphics:
      slash_color: [255, 255, 255]  # White flash
      slash_width: 32
      slash_length: 48

  magic_dagger:
    name: "Magic Dagger"
    description: "A light dagger enchanted for spellcasters"
    category: "dagger"
    damage: 4
    range: 1  # 1 tile reach for dagger
    bonus_stat: "Accuracy"
    bonus_stat_secondary: "Intellect"
    crit_chance: 15
    rarity: "uncommon"
    value: 120

    # Melee-specific configuration
    melee:
      arc_type: 1
      animation_frames: 6  # Quick stab animation
      hit_delay: 1      # Instant hit for dagger

    # Visual effects for slash animation
    graphics:
      slash_color: [100, 255, 200]  # Magic green flash
      slash_width: 24
      slash_length: 32

  throwing_knife:
    name: "Throwing Knife"
    description: "A balanced knife meant for quick throws"
    category: "dagger"
    damage: 4
    range: 4  # Display range in tiles (>3 -> ranged dispatch)
    bonus_stat: "Accuracy"
    crit_chance: 5
    rarity: "common"
    value: 20
    damage_type: "physical"

    # Projectile physics (tile-based)
    physics:
      speed_tiles: 12.0          # Fast throw
      range_tiles: 4.0           # 4 tile range, matches display range
      collision_size_tiles: 0.5  # Minimum collision size (0.5 tiles)

    graphics:
      max_size: 20
      min_size: 2
      base_size: 8
      color: [160, 160, 160]  # Gray knives

  holy_mace:
    name: "Holy Mace"
    description: "A blessed mace that channels divine power"
