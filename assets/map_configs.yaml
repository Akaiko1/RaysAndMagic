# Floor-texture groups are biome-driven: defined once per biome below and
# shared by every map that declares that biome. Tiles pick a group via their
# `floor_texture_group` field (see tiles.yaml); the renderer builds one atlas
# per biome. The "beach" group is selected dynamically by the renderer for
# empty tiles bordering water.
biomes:
  forest:
    floor_texture_groups:
      default:
        - "forest_grass_0"
        - "forest_grass_1"
        - "forest_grass_2"
        - "forest_grass_3"
      beach:
        - "beach_sand_0"
        - "beach_sand_1"
      water:
        - "water_0"
        - "water_1"
      forest_stream:
        - "forest_stream_0"
        - "forest_stream_1"
      # Quest bridge planks (wolf cull opens a bridge to the lake trader)
      quest_bridge:
        - "quest_bridge_0"
      clearing:
        - "clearing_grass_0"
        - "clearing_grass_1"
      # Used only by the Highlands portal stream tile (J) in forest.map.
      highlands_stream:
        - "highlands_stream_0"
        - "highlands_stream_1"

  desert:
    floor_texture_groups:
      default:
        - "desert_sand_0"
        - "desert_sand_1"
        - "desert_sand_2"
        - "desert_sand_3"
      beach:
        - "beach_sand_0"
        - "beach_sand_1"
      water:
        - "water_0"
        - "water_1"

  water:
    floor_texture_groups:
      default:
        - "underwater_floor_0"
        - "underwater_floor_1"
        - "underwater_floor_2"
        - "underwater_floor_3"
      water:
        - "water_0"
        - "water_1"

  church:
    floor_texture_groups:
      default:
        - "church_floor_0"
        - "church_floor_1"
        - "church_floor_2"
        - "church_floor_3"

  pyramid:
    floor_texture_groups:
      default:
        - "pyramid_floor_0"
        - "pyramid_floor_1"
        - "pyramid_floor_2"
        - "pyramid_floor_3"

  lich_nexus:
    floor_texture_groups:
      default:
        - "lich_nexus_floor_0"
        - "lich_nexus_floor_1"
        - "lich_nexus_floor_2"
        - "lich_nexus_floor_3"

  culverts:
    floor_texture_groups:
      default:
        - "culverts_floor_0"
        - "culverts_floor_1"
        - "culverts_floor_2"
        - "culverts_floor_3"

  # Each castle floor is its OWN single-texture group so the map can paint floors
  # deliberately by tile letter (cobble courtyard / wood halls / tatami rooms /
  # blossom garden), not the random-from-group variety the other biomes use.
  japanese_castle:
    floor_texture_groups:
      cobble:
        - "japanese_castle_floor_0"
      wood:
        - "japanese_castle_floor_1"
      tatami:
        - "japanese_castle_floor_2"
      garden:
        - "japanese_castle_floor_3"

  city:
    floor_texture_groups:
      default:
        - "city_cobblestone_0"
        - "city_cobblestone_1"
        - "city_cobblestone_2"
        - "city_cobblestone_3"

  highlands:
    floor_texture_groups:
      default:
        - "highlands_grass_0"
        - "highlands_grass_1"
        - "highlands_grass_2"
        - "highlands_grass_3"
      highlands_stream:
        - "highlands_stream_0"
        - "highlands_stream_1"

  dragon_cliffs:
    floor_texture_groups:
      default:
        - "dragon_cliffs_grass_0"
        - "dragon_cliffs_grass_1"
      basalt:
        - "dragon_cliffs_basalt_0"
        - "dragon_cliffs_basalt_1"
      dragon_cliffs_stream:
        - "dragon_cliffs_stream_0"
        - "dragon_cliffs_stream_1"
      # Bridge / chasm-edge / chasm-floor are split into explicit per-variant
      # groups (each one texture) so the matching tile renders a fixed look the
      # designer chose, rather than a random variant. See the v0/v1 tiles in
      # tiles.yaml (letters M/N, E/J, C/F).
      bridge_0:
        - "dragon_cliffs_bridge_0"
      bridge_1:
        - "dragon_cliffs_bridge_1"
      chasm_edge_0:
        - "dragon_cliffs_chasm_edge_0"
      chasm_edge_1:
        - "dragon_cliffs_chasm_edge_1"
      chasm_floor_0:
        - "dragon_cliffs_chasm_floor_0"
      chasm_floor_1:
        - "dragon_cliffs_chasm_floor_1"

  # Amazon-style jungle: dense leaf-litter floor (own art), the river reuses the
  # universal water tiles for its impassable channel/oxbow, walkable fords reuse
  # the forest_stream texture, and the renderer auto-selects "beach" for the
  # sandy banks bordering water.
  jungle:
    # Off-map backdrop: dense jungle foliage wall instead of the global seaview.
    out_of_bounds_tile: "jungle_wall_foliage"
    floor_texture_groups:
      # Terra-firme upland: earthy leaf-litter + vine-mat, mixed for organic variety.
      default:
        - "deep_jungle_floor_0"
        - "deep_jungle_floor_3"
      # Mossy carved flagstone - the lost-city plaza/causeways (tile letter ':').
      ruin:
        - "deep_jungle_floor_1"
      # Wet flooded floodplain ground - varzea (tile letter ',').
      varzea:
        - "deep_jungle_floor_2"
      water:
        - "water_0"
        - "water_1"
      beach:
        - "beach_sand_0"
        - "beach_sand_1"
      jungle_ford:
        - "dragon_cliffs_bridge_1"

maps:
  forest:
    name: "Elvish Forest"
    file: "forest.map"
    biome: "forest"
    sky_color: [135, 206, 235]        # Light blue sky
    sky_texture: "forest_panorama"
    default_floor_color: [60, 180, 60]  # Green grass
    canopy_shade:
      min_ambient: 0.7
      radius_tiles: 3.0
      start_density: 2
      full_density: 8

  desert:
    name: "Scorching Desert"
    file: "desert.map"
    biome: "desert"
    sky_color: [255, 218, 185]        # Sandy beige sky
    sky_texture: "desert_panorama"
    default_floor_color: [238, 203, 173]  # Desert sand
    # Two independent bandit camps, one per oasis. Each monster is bound to
    # the encounter whose chest tile is nearest, so clearing the 5 bandits
    # around an oasis drops that oasis's chest at its water's edge.
    clear_encounters:
      - monsters:
          - type: "bandit"
            count: 5
        rewards:
          completion_message: "The northwest oasis is clear. A stash glints at the water's edge."
          treasure_chest:
            id: "desert_oasis_nw_chest"
            map: "desert"
            tile_x: 12
            tile_y: 8
            sprite: "chest"
            size_multiplier: 5.0
            gold: 500
      - monsters:
          - type: "bandit"
            count: 5
        rewards:
          completion_message: "The southeast oasis is clear. A stash glints at the water's edge."
          treasure_chest:
            id: "desert_oasis_se_chest"
            map: "desert"
            tile_x: 37
            tile_y: 41
            sprite: "chest"
            size_multiplier: 5.0
            gold: 500

  water:
    name: "Ocean Depths"
    file: "water.map"
    biome: "water"
    sky_color: [72, 61, 139]          # Dark slate blue underwater
    sky_texture: "water_panorama"
    default_floor_color: [25, 25, 112]  # Midnight blue ocean floor

  church:
    name: "Abandoned Church"
    file: "church.map"
    biome: "church"
    sky_color: [35, 35, 45]
    sky_texture: "church_panorama"
    default_floor_color: [55, 50, 45]
    ambient_light: 0.35   # candle-dark nave; corner torches carry the light
    wall_torches: true    # flickering torch at every inner wall corner
    clear_encounter:
      rewards:
        completion_message: "The last skeleton collapses. A sealed chest appears at the end of the corridor."
        treasure_chest:
          id: "church_skeleton_chest"
          map: "church"
          tile_x: 15
          tile_y: 1
          sprite: "chest"
          size_multiplier: 5.0
          random_weapon_count: 1

  pyramid_1:
    name: "Pyramid - Level 1"
    file: "pyramid_1.map"
    biome: "pyramid"
    sky_color: [70, 55, 35]
    sky_texture: "pyramid_panorama"
    default_floor_color: [154, 125, 76]

  pyramid_2:
    name: "Pyramid - Level 2"
    file: "pyramid_2.map"
    biome: "pyramid"
    sky_color: [60, 48, 34]
    sky_texture: "pyramid_panorama"
    default_floor_color: [142, 112, 70]

  pyramid_3:
    name: "Pyramid - Sanctum"
    file: "pyramid_3.map"
    biome: "pyramid"
    sky_color: [55, 42, 32]
    sky_texture: "pyramid_panorama"
    default_floor_color: [132, 100, 64]
    clear_encounter:
      rewards:
        completion_message: "The last Isis falls. Four sealed dragon reliquaries slide open behind the dais."
        treasure_chests:
          - id: "pyramid_black_dragon_statuette_chest"
            map: "pyramid_3"
            tile_x: 9
            tile_y: 3
            sprite: "pyramid_chest"
            size_multiplier: 5.0
            items: ["black_dragon_statuette"]
          - id: "pyramid_red_dragon_statuette_chest"
            map: "pyramid_3"
            tile_x: 13
            tile_y: 3
            sprite: "pyramid_chest"
            size_multiplier: 5.0
            items: ["red_dragon_statuette"]
          - id: "pyramid_green_dragon_statuette_chest"
            map: "pyramid_3"
            tile_x: 17
            tile_y: 3
            sprite: "pyramid_chest"
            size_multiplier: 5.0
            items: ["green_dragon_statuette"]
          - id: "pyramid_gold_dragon_statuette_chest"
            map: "pyramid_3"
            tile_x: 21
            tile_y: 3
            sprite: "pyramid_chest"
            size_multiplier: 5.0
            items: ["gold_dragon_statuette"]

  lich_nexus:
    name: "Lich Nexus"
    file: "lich_nexus.map"
    biome: "lich_nexus"
    sky_color: [18, 16, 28]
    sky_texture: "lich_nexus_panorama"
    default_floor_color: [32, 28, 42]

  culverts:
    name: "Seabright Culverts"
    file: "culverts.map"
    biome: "culverts"
    sky_color: [20, 24, 26]
    sky_texture: "culverts_panorama"
    default_floor_color: [58, 54, 48]
    ambient_light: 0.3   # pitch-dark sewers: bring a torch (or a fireball)
    wall_torches: true   # flickering torches at inner wall corners light the maze

  japanese_castle:
    name: "Eastern Isle Castle"
    file: "japanese_castle.map"
    biome: "japanese_castle"
    sky_color: [18, 22, 40]              # moonlit night
    sky_texture: "japanese_castle_panorama"
    default_floor_color: [70, 64, 56]
    ambient_light: 0.5   # moonlit courtyard; lantern glow carries the halls
    wall_torches: true   # paper lanterns flicker at inner wall corners

  city:
    name: "Seabright"
    file: "city.map"
    biome: "city"
    sky_color: [120, 190, 230]
    sky_texture: "city_panorama"
    default_floor_color: [108, 102, 88]

  highlands:
    name: "Misty Highlands"
    file: "highlands.map"
    biome: "highlands"
    sky_color: [150, 165, 180]          # Overcast highland sky
    sky_texture: "highlands_panorama"
    default_floor_color: [86, 110, 74]  # Muted highland grass

  dragon_cliffs:
    name: "Dragon Cliffs"
    file: "dragon_cliffs.map"
    biome: "dragon_cliffs"
    sky_color: [86, 66, 72]             # Ashen, dragon-smoke sky
    sky_texture: "dragon_cliffs_panorama"
    default_floor_color: [92, 112, 64]  # Cliff grass

  deep_jungle:
    name: "Deep Jungle"
    file: "deep_jungle.map"
    biome: "jungle"
    sky_color: [54, 84, 64]             # Humid green canopy haze
    sky_texture: "deep_jungle_panorama"
    default_floor_color: [34, 78, 40]   # Dark jungle green
    ambient_light: 1.0   # full daylight; no ambient darkening
    # Slay the warlord (only possible once his idols are broken) -> the lost
    # city's treasury opens in the plaza. Zone gear + gold only; his uniques
    # drop from the boss itself (loots.yaml), so none can leak here.
    # PLURAL clear_encounters: binds only the N-nearest monsters of the listed
    # type to the chest. The SINGULAR `clear_encounter` ignores `monsters:` and
    # binds EVERY mob on the map (chest fires only when the LAST one dies) - wrong
    # here: we want the chest the instant the warlord dies, not after the whole
    # zone is swept.
    clear_encounters:
      - monsters:
          - type: "orc_hero_boss"
            count: 1
        rewards:
          completion_message: "The warlord falls. A flagstone grinds aside - the lost city's treasury lies open."
          treasure_chest:
            id: "lost_city_treasury"
            map: "deep_jungle"
            tile_x: 38
            tile_y: 13
            sprite: "chest"
            size_multiplier: 5.0
            loot_table: "lost_city_cache"   # 3 rolls of zone gear + 400-900 gold
