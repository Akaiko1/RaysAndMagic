  # ---------------------------------------------------------------------------
  # Highlands monsters (target party levels 6-12), ascending power. Biome-scoped
  # to "highlands" and distributed by habitat: beasts/archers in heather & rocks,
  # knights/casters near ruins, the lich by the slate tombs. HP/AC/dmg/xp
  # interpolate the existing curve (troll L6 ~160 HP -> dragon L15 ~1100 HP).
  # ---------------------------------------------------------------------------

  # L6 - fast, fragile beast. Agile (high dodge), pounces from heather/rocks.
  puma:
    name: "Puma"
    banding: true
    level: 6
    max_hit_points: 150
    armor_class: 20
    experience: 280
    damage_min: 19
    damage_max: 27
    perfect_dodge: 20
    alert_radius: 6
    attack_radius: 1
    speed: 2.3
    gold_min: 5
    gold_max: 25
    sprite: "puma"
    letter: "c"
    box_w: 48
    box_h: 48
    size_class: medium
    biomes: ["highlands"]
    pounce_range_tiles: 4         # leaps to melee from up to 4 tiles
    pounce_cooldown_seconds: 4
    resistances: {}
    habitat_preferences:
      - "highlands_floor"
      - "highlands_heather"
    habitat_near:
