    type: "dragon"
    name: "Dragon"
    level: 15
    max_hit_points: 1100
    armor_class: 18
    experience: 2000
    damage_min: 30
    damage_max: 50
    alert_radius: 5
    attack_radius: 2
    projectile_spell: "darkbolt"
    ranged_attack_range: 3
    speed: 3.75
    gold_min: 500
    gold_max: 1500
    sprite: "dragon_red"
    flying: true
    letter: "r"
    box_w: 48
    box_h: 48
