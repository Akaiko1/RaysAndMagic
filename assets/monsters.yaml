# Damage type mappings for resistances
damage_types:
  physical: 0
  fire: 1
  water: 2
  air: 3
  earth: 4
  spirit: 5
  mind: 6
  body: 7
  light: 8
  dark: 9

# Tile type mappings for habitat preferences
tile_types:
  empty: 0
  tree: 1
  ancient_tree: 2
  thicket: 3
  clearing: 4
  forest_stream: 5
  mushroom_ring: 6
  firefly_swarm: 7
  fern_patch: 8
  moss_circle: 9
  fallen_log: 10
  boulder: 11
  flower_patch: 12
