  goblin:
    name: "Goblin"
    banding: true
    level: 1
    max_hit_points: 50
    armor_class: 13
    experience: 15
    damage_min: 4
    damage_max: 8
    alert_radius: 3
    attack_radius: 1  # 1 tile (melee range)
    speed: 1.5
    gold_min: 1
    gold_max: 10
