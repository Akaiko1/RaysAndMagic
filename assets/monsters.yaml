      physical: 25
      fire: -25                # nature dragon: vulnerable to fire
    habitat_preferences:
      - "empty"

  dragon_gold:
    type: "dragon"
    name: "Dragon"
    level: 15
    max_hit_points: 1350       # a bit squishier but faster + longer reach
    armor_class: 52
    experience: 2000
    damage_min: 32
    damage_max: 52
    true_damage: 10  # gold dragon: +10 unmitigable per hit
    attack_cooldown_multiplier: 0.85
    dragon_breath_chance: 0.33
    dragon_breath_damage_type: "air"
    stun_char_chance: 0.10        # 10% to stun the struck character
