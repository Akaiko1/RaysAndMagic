    letter: "c"
    box_w: 48
    box_h: 48
    size_game: 5.0
    biomes: ["highlands"]
    pounce_range_tiles: 4         # leaps to melee from up to 4 tiles
    pounce_cooldown_seconds: 4
    resistances: {}
    habitat_preferences:
