  # Elemental dragon variants - wild dragons (dragon_cliffs biome + the two cliff
  # lair caves) and the desert-statue ELITES are built from these. The 4 elite
  # `elder_dragon*` entries below summon from the statues; these base entries are
  # the ordinary dragons. They differ only in element (resists/projectile/proc).
  dragon_red:
    type: "dragon"
    name: "Dragon"
    level: 15
    max_hit_points: 1400
    armor_class: 52
    experience: 2000
    damage_min: 34
    damage_max: 54
    true_damage: 10  # red dragon: +10 unmitigable per hit
    dragon_breath_chance: 0.33
    dragon_breath_damage_type: "dark"
    ignite_chance: 0.30           # 30% to set a character ablaze
    ignite_duration_seconds: 30   # burn DoT (3x poison strength), stacks with poison
    alert_radius: 5
    attack_radius: 2
    projectile_spell: "darkbolt"
    ranged_attack_range: 3
    speed: 3.75
    gold_min: 500
    gold_max: 1500
    sprite: "dragon_red"
    flying: true
    letter: "r"
    box_w: 48
    box_h: 48
    size_class: huge
    biomes: ["desert"]
    resistances:
      dark: 90
      physical: 10
      fire: 40
    habitat_preferences:
      - "empty"

  dragon_green:
    type: "dragon"
    name: "Dragon"
    banding: true
    level: 15
    max_hit_points: 1500
    armor_class: 70            # tankier: melee-only, no ranged attack
    experience: 2000
    damage_min: 36
    damage_max: 58
    true_damage: 10  # green dragon: +10 unmitigable per hit
