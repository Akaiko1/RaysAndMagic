# Quest Configuration
# This file defines all quests in the game

quests:
  # Starting quests - given at the beginning of the game
  goblin_hunt:
    name: "Goblin Hunt"
    description: "The local village has been plagued by goblins. Hunt down 5 of them to make the area safer."
    type: "kill"
    target_monster: "goblin"
    target_count: 5
    is_starting_quest: true
    rewards:
      gold: 50
      experience: 100

  wolf_pack:
    name: "Wolf Pack"
    description: "A pack of wolves has been attacking travelers on the road. Eliminate 3 wolves to protect the trade routes."
    type: "kill"
    target_monster: "wolf"
    target_count: 3
    is_starting_quest: true
    rewards:
      gold: 75
      experience: 150

  # Archmage trial - given by the Mage Tower; turning it in promotes a member.
  archmage_trial:
    name: "The Archmage's Trial"
    description: "Prove your mastery of Light: slay the Lich King, then return to the Mage Tower."
    type: "kill"
    target_monster: "lich_king"
    target_count: 1
    is_starting_quest: false
    rewards:
      gold: 0
      experience: 0

  dragon_cliffs_troll_cull:
    name: "Cliffwatch Troll Cull"
    description: "Maera Cliffwatch wants the mountain trolls thinned before they overrun the bridge approaches."
    type: "kill"
    target_monster: "mountain_troll"
    target_count: 3
    target_map: "dragon_cliffs"   # cull the cliff trolls; trolls also roam the highlands
    is_starting_quest: false
    rewards:
      gold: 900
      experience: 800

  culverts_valves:
    name: "Stem the Flow"
    description: "Old Sewerman Garran wants the seven sluice valves in the Seabright culverts shut to flush out the Golden Thief Bug's lair."
    type: "interact"
    target_monster: "valve"   # interaction tag matched by OnInteract
    target_count: 7
    is_starting_quest: false
    rewards:
      gold: 1500
      experience: 700

  castle_armory:
    name: "The Warlord's Armoury"
    description: "An old retainer at the eastern castle bids you strip the five katana racks hidden behind the keep's shoji screens. Only when the castle's own steel is taken will the sealed Samurai Warlord stir to face you."
    type: "interact"
    target_monster: "sword_rack"   # interaction tag matched by OnInteract
    target_count: 5
    is_starting_quest: false
    rewards:
      gold: 2500
      experience: 1600

  # Aldric's wolf cull: completes when NO living wolf remains on the forest map
  # (extermination check), not just at the kill quota. Completion swaps the two
  # water tiles east of the lake trader for bridge planks.
  forest_wolf_cull:
    name: "Wolves of the Lakeshore"
    description: "Mystic Trader Aldric will lay a bridge to his colleague on the lake once every wolf in the Elvish Forest is dead."
    type: "kill"
    target_monster: "wolf"
    target_count: 21
    target_map: "forest"
    exterminate: true
    is_starting_quest: false
    rewards:
      gold: 600
      experience: 700
    on_complete_tiles:
      - { map: forest, x: 22, y: 24, tile: quest_bridge }
      - { map: forest, x: 23, y: 24, tile: quest_bridge }

  dragon_cliffs_ember_rites:
    name: "Ember Rites"
    description: "Old Varric says the cliff mages have begun listening to something beneath the dragon bones. Slay two archmages to break the rite."
    type: "kill"
    target_monster: "archmage"
    target_count: 2
    target_map: "dragon_cliffs"   # break the cliff rite; archmages also dwell in the highlands
    is_starting_quest: false
    rewards:
      gold: 1200
      experience: 1200

  # Main quest - victory condition
  dragon_slayer:
    name: "Dragon Slayer"
    description: "Legendary dragons terrorize the desert. Slay all 4 dragons to become a true hero and save the realm."
    type: "kill"
    target_monster: "dragon"
    target_count: 4
    is_starting_quest: true
    rewards:
      gold: 5000
      experience: 10000
