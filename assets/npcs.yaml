  # Invisible gate NPCs for the forest↔highlands portal. sprite "" renders
  # nothing at all; ground_tile paints the portal-stream tile under the gate so
  # the party steps onto shimmering water. Triggered with the interact key.
  portal_gate_highlands:
    name: "Mountain Path"
    type: "encounter"
    description: "A shimmer over the stream — a path toward the misty highlands"
    sprite: ""
    ground_tile: "forest_portal_stream"
    transparent: true
    size_multiplier: 1
    dialogue:
      greeting: "The water shimmers with a cold mountain light. A path to the misty highlands opens beyond."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Travel to the highlands"
          action: "enter_map"
          map: "highlands"
        - text: "Stay in the forest"
          action: "leave"

  portal_gate_forest:
    name: "Forest Path"
    type: "encounter"
    description: "The shimmer that leads back down to the forest"
    sprite: ""
    ground_tile: "highlands_stream"
    transparent: true
    size_multiplier: 1
    dialogue:
      greeting: "The mountain mist parts, revealing the green path back down to the forest."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Return to the forest"
          action: "enter_map"
          map: "forest"
        - text: "Stay in the highlands"
          action: "leave"

  city_exit:
    name: "City Gate"
    type: "encounter"
    description: "The main gate back to the forest road"
    sprite: "city_gate"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 1.0
    dialogue:
      greeting: "The gate opens back onto the forest path."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Return to the forest"
          action: "enter_map"
          map: "forest"
        - text: "Stay in Seabright"
          action: "leave"

  city_weapon_shop:
    name: "Seabright Arms"
    type: "merchant"
    description: "A weapon shop with upgraded blades, bows and staves"
    sprite: "merchant"
    size_multiplier: 4
    sell_available: true
    dialogue:
      greeting: "Starter steel won't last the road. These will."
    # Stock is one class-appropriate upgrade above the starter loadout —
    # nothing here matches an item the party already carries at L1.
    inventory:
      - type: "weapon"
        name: "Silver Sword"
        cost: 800
        quantity: 2
      - type: "weapon"
        name: "Steel Mace"
        cost: 550
        quantity: 2
      - type: "weapon"
        name: "Battle Staff"
        cost: 400
        quantity: 2
      - type: "weapon"
        name: "Elven Bow"
        cost: 750
        quantity: 1
      - type: "weapon"
        name: "Throwing Knife"
        cost: 200
        quantity: 3

  city_potion_shop:
    name: "Harbor Remedies"
    type: "merchant"
    description: "A small apothecary selling road medicine"
    sprite: "merchant"
    size_multiplier: 4
    sell_available: true
    dialogue:
      greeting: "Careful bottles, clear labels, no mystery brews."
    inventory:
      - type: "potion"
        name: "Health Potion"
        cost: 50
        quantity: 12
      - type: "potion"
        name: "Revival Potion"
        cost: 500
        quantity: 3

  city_spell_shop:
    name: "Tideglass Scriptorium"
    type: "spell_trader"
    description: "A spell shop whose windows overlook the harbor"
    sprite: "elf_warrior"
    size_multiplier: 4
    dialogue:
      greeting: "Ink, salt, and spellwork. Choose a character and a spell."
      insufficient_gold: "You need %d gold for this spell."
      already_known: "%s already knows this spell."
      success: "%s learned the spell."
    # The elemental catalog: every Fire, Water, Air and Earth spell (no Light or
    # Dark). Each entry authors only its shop price; name/school/level/requirements
    # are backfilled from spells.yaml (see backfillTraderSpells).
    spells:
      # Fire
      fireball: { cost: 400 }
      firebolt: { cost: 250 }
      torch_light: { cost: 150 }
      inferno: { cost: 2500 }
      # Water
      ice_bolt: { cost: 250 }
      walk_on_water: { cost: 750 }
      water_breathing: { cost: 800 }
      hot_steam: { cost: 1500 }
      # Air
      sparks: { cost: 150 }
      lightning: { cost: 600 }
      wizard_eye: { cost: 700 }
      starburst: { cost: 2000 }
      # Earth
      rock_blast: { cost: 350 }
      deadly_swarm: { cost: 700 }
      stun: { cost: 600 }
      stone_skin: { cost: 500 }

  city_mastery_trainer:
    name: "Master Ilyra"
    type: "skill_trainer"
    description: "A city trainer who sharpens known skills and magic schools"
    sprite: "elf"
