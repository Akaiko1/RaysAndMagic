# UgaTaima NPC Configuration
#
# NPC TYPES:
# - spell_trader: Teaches spells to party members for gold
# - skill_trainer: Trains skills (already implemented in code)
# - merchant: Sells items
# - quest_giver: Gives quests
#
# PLACEMENT FORMAT:
# Use [npc:key] in map files to place NPCs
# The key corresponds to an NPC definition in this file

npcs:
  # Spell Traders - NPCs who teach spells for gold
  spell_trader_mage:
    name: "Mystic Trader Eldrich"
    type: "spell_trader"
    description: "A mysterious mage who trades arcane knowledge for gold"
    sprite: "elf_warrior"
    size_multiplier: 4
    dialogue:
      greeting: "Greetings, traveler! I deal in magical knowledge. Choose a character and spell to learn."
      insufficient_gold: "You need %d gold to learn this spell."
      already_known: "%s already knows this spell."
      success: "The knowledge flows into %s's mind. Use it wisely!"

    # Spells this NPC can teach
    spells:
      walk_on_water:
        name: "Walk on Water"
        school: "water"
        cost: 1000
        description: "Allows the party to walk across water surfaces for a limited time"
        requirements:
          min_level: 3
          schools:
            - school: "water"
              min_level: 1

      water_breathing:
        name: "Water Breathing"
        school: "water"
        cost: 1500
        description: "Allows underwater exploration for extended periods"
        requirements:
          min_level: 5
          schools:
            - school: "water"
              min_level: 2

      inferno:
        name: "Inferno"
        school: "fire"
        cost: 2500
        description: "Engulfs everything around the party in flame — friend and foe alike"
        requirements:
          min_level: 7
          schools:
            - school: "fire"
              min_level: 2

      starburst:
        name: "Starburst"
        school: "air"
        cost: 2000
        description: "A bolt that bursts into a rain of falling stars over a wide area"
        requirements:
          min_level: 6
          schools:
            - school: "air"
              min_level: 2

  # Spell trader for testing
  mtrader0:
    name: "Mystic Trader Aldric"
    type: "spell_trader"
    description: "A wise old mage who trades in magical knowledge"
    sprite: "human"
    size_multiplier: 4
    dialogue:
      greeting: "Greetings, traveler! I possess ancient spells for those with coin."
      insufficient_gold: "You lack the gold required for this knowledge."
      already_known: "This character already knows that spell."
      success: "The magical knowledge has been imparted. Use it wisely!"
    spells:
      walk_on_water:
        name: "Walk on Water"
        school: "water"
        cost: 1000
        description: "Allows the caster to walk on water surfaces for a limited time."
        requirements:
          min_level: 3
          schools:
            - school: "water"
              min_level: 1
      heal:
        name: "First Aid"
        school: "body"
        cost: 150
        description: "Restores a little health to the caster."
        requirements:
          schools:
            - school: "body"
              min_level: 1
      heal_other:
        name: "Heal"
        school: "body"
        cost: 500
        description: "Restores health to another party member."
        requirements:
          schools:
            - school: "body"
              min_level: 2
      harm:
        name: "Harm"
        school: "body"
        cost: 300
        description: "Concentrated body energy that wounds a foe."
        requirements:
          schools:
            - school: "body"
              min_level: 1
      mass_heal:
        name: "Mass Heal"
        school: "body"
        cost: 800
        description: "A wave of healing that mends the whole party at once."
        requirements:
          min_level: 4
          schools:
            - school: "body"
              min_level: 2
      bless:
        name: "Bless"
        school: "spirit"
        cost: 700
        description: "Blesses the party with divine protection (+10 to all stats)."
        requirements:
          schools:
            - school: "spirit"
              min_level: 2
      spirit_lash:
        name: "Spirit Lash"
        school: "spirit"
        cost: 300
        description: "A whip of spirit energy that scourges a foe."
        requirements:
          schools:
            - school: "spirit"
              min_level: 1
      heroism:
        name: "Heroism"
        school: "spirit"
        cost: 900
        description: "Fills the party with valor, boosting the damage they deal."
        requirements:
          min_level: 4
          schools:
            - school: "spirit"
              min_level: 2
      raise_dead:
        name: "Raise Dead"
        school: "spirit"
        cost: 1500
        description: "Restores a fallen ally (not eradicated) to 25% of their health."
        requirements:
          min_level: 6
          schools:
            - school: "spirit"
              min_level: 3

  # Example of other NPC types for future expansion
  merchant_general:
    name: "Trader Marcus"
    type: "merchant"
    description: "A general goods merchant with basic supplies"
    sprite: "elf"
    size_multiplier: 4
    dialogue:
      greeting: "Welcome to my shop! What can I get for you today?"
    inventory:
      - type: "potion"
        name: "Health Potion"
        cost: 50
        quantity: 10
      - type: "weapon"
        name: "Iron Sword"
        cost: 200
        quantity: 3

  desert_merchant:
    name: "Sahim the Wayfarer"
    type: "merchant"
    description: "A desert trader with a keen eye for useful gear"
    sprite: "merchant"
    size_multiplier: 4
    sell_available: true
    dialogue:
      greeting: "Spare tools and trinkets? I pay fair coin."

  quest_elder:
    name: "Village Elder Aldwin"
    type: "quest_giver"
    description: "The wise village elder with knowledge of ancient secrets"
    sprite: "elf_warrior"
    dialogue:
      greeting: "Young adventurer, I have a task that requires your skills..."

  shipwreck_bandit_camp:
    name: "Abandoned Shipwreck"
    type: "encounter"
    description: "An old shipwreck that appears abandoned, but sounds come from within"
    sprite: "shipwreck"
    render_type: "environment_sprite"
    transparent: true
    dialogue:
      greeting: "You approach an old shipwreck half-buried in the ground. Through gaps in the rotted hull, you hear voices and see flickering firelight. It seems bandits have made this wreck their hideout."
      visited_message: "The shipwreck appears empty now."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Leave quietly"
          action: "leave"
        - text: "Attack the bandits"
          action: "combat"
    encounter:
      type: "bandit_camp"
      start_message: "Bandits emerge from the shipwreck to attack!"
      quest_id: "shipwreck_bandits"
      quest_name: "Clear the Shipwreck"
      quest_description: "Bandits have made a hideout in an old shipwreck. Defeat them all to claim the bounty."
      monsters:
        - type: "bandit"
          count_min: 2
          count_max: 5
      rewards:
        gold: 2000
        experience: 500
        completion_message: "The shipwreck bandits have been defeated!"
      first_visit_only: true

  # Dragon statues (desert corners). Unique names so save/load tracks each
  # spent statue independently. The "summon" choice is injected at dialog-open
  # from the statuettes the party holds; only "Leave" is static here.
  dragon_statue_black:
    name: "Black Dragon Statue"
    type: "encounter"
    description: "A coiled obsidian dragon, mouth agape as if mid-roar"
    sprite: "dragon_statue"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 5.0
    dialogue:
      greeting: "The statue's hollow eyes seem to follow you. Carved runes hint that a dragon statuette could wake what sleeps in the stone."
      choice_prompt: "Place a statuette?"
      choices:
        - text: "Leave"
          action: "leave"
    summons:
      - statuette: "Black Dragon Statuette"
        monster: "dragon"
        label: "Black"

  dragon_statue_red:
    name: "Red Dragon Statue"
    type: "encounter"
    description: "A rearing crimson dragon wrought in dark stone"
    sprite: "dragon_statue"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 5.0
    dialogue:
      greeting: "The statue's hollow eyes seem to follow you. Carved runes hint that a dragon statuette could wake what sleeps in the stone."
      choice_prompt: "Place a statuette?"
      choices:
        - text: "Leave"
          action: "leave"
    summons:
      - statuette: "Red Dragon Statuette"
        monster: "dragon_red"
        label: "Red"

  dragon_statue_green:
    name: "Green Dragon Statue"
    type: "encounter"
    description: "A serpentine dragon of mossy green stone"
    sprite: "dragon_statue"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 5.0
    dialogue:
      greeting: "The statue's hollow eyes seem to follow you. Carved runes hint that a dragon statuette could wake what sleeps in the stone."
      choice_prompt: "Place a statuette?"
      choices:
        - text: "Leave"
          action: "leave"
    summons:
      - statuette: "Green Dragon Statuette"
        monster: "dragon_green"
        label: "Green"

  dragon_statue_gold:
    name: "Gold Dragon Statue"
    type: "encounter"
    description: "A gilded dragon that glints even in the shade"
    sprite: "dragon_statue"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 5.0
    dialogue:
      greeting: "The statue's hollow eyes seem to follow you. Carved runes hint that a dragon statuette could wake what sleeps in the stone."
      choice_prompt: "Place a statuette?"
      choices:
        - text: "Leave"
          action: "leave"
    summons:
      - statuette: "Gold Dragon Statuette"
        monster: "dragon_gold"
        label: "Gold"

  prison:
    name: "Mountain Prison"
    type: "encounter"
    description: "A grim stockade of black iron, two elf jailers pacing the gate"
    sprite: "prison"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 5.0
    dialogue:
      greeting: "Two champions languish in this mountain stockade, guarded by a pair of elf swordsmen. The jailers turn on you the moment you approach the bars."
      choice_prompt: "Free the prisoners?"
      choices:
        - text: "Break them out (fight the jailers)"
          action: "combat"
        - text: "Leave"
          action: "leave"
    encounter:
      type: "prison_break"
      first_visit_only: true
      start_message: "The elf jailers draw steel!"
      monsters:
        - type: "elf_swordsman"
          count_min: 2
          count_max: 2
      rewards:
        experience: 0
        completion_message: "The cages spring open — the imprisoned champions head for the tavern to await you."
        frees_captives: true

  tavern:
    name: "The Wandering Wyvern"
    type: "encounter"
    description: "A cozy timber tavern; off-duty heroes nurse their drinks here"
    sprite: "tavern"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 6.0
    dialogue:
      greeting: "The keeper nods. 'Your benched companions rest here. Care to shuffle the party?'"
      choice_prompt: "Manage your roster?"
      choices:
        - text: "Manage roster"
          action: "open_roster"
        - text: "Leave"
          action: "leave"

  mage_tower:
    name: "Mage Tower"
    type: "encounter"
    description: "A slender spire of pale stone, humming faintly with warded power"
    sprite: "mage_tower"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 6.0
    dialogue:
      greeting: "A voice echoes from the tower's heights: 'Only one who has broken the Lich King may be raised to Archmage and command the Light. Will you take the trial?'"
      choice_prompt: "The Mage Tower awaits."
      choices:
        - text: "Accept the trial (slay the Lich King)"
          action: "give_quest"
          quest_id: "archmage_trial"
        - text: "I have slain the Lich King"
          action: "turn_in_quest"
          quest_id: "archmage_trial"
        - text: "Leave"
          action: "leave"

  dragon_cliffs_ranger:
    name: "Maera Cliffwatch"
    type: "quest_giver"
    description: "A wind-battered scout who watches the dragon cliffs for raiders and trolls"
    sprite: "dragon_cliffs_ranger"
    size_multiplier: 4
    dialogue:
      greeting: "Keep low when the wind shifts. The trolls use the cliff mist as cover, and they are getting bold near the bridge stones."
      choice_prompt: "Maera studies the ridgeline."
      choices:
        - text: "Ask about the troll raids"
          action: "give_quest"
          quest_id: "dragon_cliffs_troll_cull"
        - text: "Leave"
          action: "leave"

  dragon_cliffs_bone_hermit:
    name: "Old Varric Bone-Speaker"
    type: "quest_giver"
    description: "A hermit draped in dragon teeth and old cliff charms"
    sprite: "dragon_cliffs_bone_hermit"
    size_multiplier: 4
    dialogue:
      greeting: "The bones remember flame. Something below the cliffs has taught the mountain mages to listen to it."
      choice_prompt: "The hermit taps his dragon-bone staff."
      choices:
        - text: "Ask about the ember rites"
          action: "give_quest"
          quest_id: "dragon_cliffs_ember_rites"
        - text: "Leave"
          action: "leave"

  dragon_cliffs_bone_lair:
    name: "Bone-Maw Lair"
    type: "encounter"
    description: "A cliff cave framed by fossilized dragon jaws and scattered ribs"
    sprite: "dragon_cliffs_bone_lair"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 6.0
    dialogue:
      greeting: "The cave exhales a cold animal breath. Deep inside, claws scrape stone."
      choice_prompt: "Enter the Bone-Maw?"
      choices:
        - text: "Enter the lair"
          action: "combat"
        - text: "Back away"
          action: "leave"
    encounter:
      type: "dragon_lair"
      first_visit_only: true
      start_message: "A green dragon coils out of the bone-strewn dark!"
      quest_id: "dragon_cliffs_bone_lair"
      quest_name: "Bone-Maw Lair"
      quest_description: "Clear the bone-framed dragon lair in the Dragon Cliffs."
      monsters:
        - type: "dragon_green"
          count_min: 1
          count_max: 1
      rewards:
        gold: 1500
        experience: 3500
        completion_message: "The Bone-Maw falls silent."

  dragon_cliffs_ember_lair:
    name: "Ember-Heart Lair"
    type: "encounter"
    description: "A basalt dragon den split by glowing ember cracks"
    sprite: "dragon_cliffs_ember_lair"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 6.0
    dialogue:
      greeting: "Heat rolls from the cave mouth. Something vast shifts behind the red glow."
      choice_prompt: "Enter the Ember-Heart?"
      choices:
        - text: "Enter the lair"
          action: "combat"
        - text: "Back away"
          action: "leave"
    encounter:
      type: "dragon_lair"
      first_visit_only: true
      start_message: "A red dragon erupts from the ember-lit cavern!"
      quest_id: "dragon_cliffs_ember_lair"
      quest_name: "Ember-Heart Lair"
      quest_description: "Clear the burning dragon lair in the Dragon Cliffs."
      monsters:
        - type: "dragon_red"
          count_min: 1
          count_max: 1
      rewards:
        gold: 2000
        experience: 4500
        completion_message: "The Ember-Heart cools to black stone."

  abandoned_church:
    name: "Abandoned Church"
    type: "encounter"
    description: "A ruined stone church whose broken doorway descends into darkness"
    sprite: "abandoned_church"
    render_type: "environment_sprite"
    transparent: true
    dialogue:
      greeting: "The abandoned church stands silent among the trees. Villagers say the old priest locked the doors after the crypt bells rang by themselves, and no one who entered after dusk returned unchanged."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Enter the church"
          action: "enter_map"
          map: "church"
        - text: "Leave it alone"
          action: "leave"

  abandoned_church_exit:
    name: "Church Entrance"
    type: "encounter"
    description: "The cold doorway back to the forest"
    sprite: "church_exit"
    render_type: "environment_sprite"
    transparent: true
    dialogue:
      greeting: "Cold air moves through the doorway behind you. The forest path is still visible beyond the ruined arch."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Return to the forest"
          action: "enter_map"
          map: "forest"
        - text: "Stay inside"
          action: "leave"

  pyramid_entrance:
    name: "Ancient Pyramid"
    type: "encounter"
    description: "A sun-baked pyramid with a narrow stairway descending into darkness"
    sprite: "pyramid_entrance"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 6
    dialogue:
      greeting: "The pyramid's entrance yawns open beneath worn sandstone blocks. Dry air carries the smell of dust, pitch, and something sealed too long."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Enter the pyramid"
          action: "enter_map"
          map: "pyramid_1"
        - text: "Leave it alone"
          action: "leave"

  pyramid_exit:
    name: "Pyramid Entrance"
    type: "encounter"
    description: "The stairway back out of the pyramid"
    sprite: "pyramid_stairs_up"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 3
    dialogue:
      greeting: "Warm daylight spills down the sandstone stairs behind you."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Leave the pyramid"
          action: "enter_map"
          map: "desert"
        - text: "Stay inside"
          action: "leave"

  pyramid_stairs_to_1:
    name: "Stairs to Level 1"
    type: "encounter"
    description: "Sandstone stairs leading upward"
    sprite: "pyramid_stairs_up"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 3
    dialogue:
      greeting: "The stairs climb toward the upper chambers."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Go to level 1"
          action: "enter_map"
          map: "pyramid_1"
        - text: "Stay here"
          action: "leave"

  pyramid_stairs_to_2:
    name: "Stairs to Level 2"
    type: "encounter"
    description: "Sandstone stairs leading deeper"
    sprite: "pyramid_stairs_down"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 3
    dialogue:
      greeting: "The stairs descend into a colder, darker level of the pyramid."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Go to level 2"
          action: "enter_map"
          map: "pyramid_2"
        - text: "Stay here"
          action: "leave"

  pyramid_stairs_to_3:
    name: "Stairs to the Sanctum"
    type: "encounter"
    description: "A narrow stairway toward the sealed sanctum"
    sprite: "pyramid_stairs_down"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 3
    dialogue:
      greeting: "A painted stairway falls away into a chamber marked by four dragon seals."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Go to the sanctum"
          action: "enter_map"
          map: "pyramid_3"
        - text: "Stay here"
          action: "leave"

  lich_nexus_entrance:
    name: "Lich Nexus"
    type: "encounter"
    description: "A black stone arch humming with trapped souls"
    sprite: "lich_nexus_entrance"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 6
    dialogue:
      greeting: "Green-violet fire coils inside the arch. Beyond it, you hear the slow chant of dead kings."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Enter the nexus"
          action: "enter_map"
          map: "lich_nexus"
        - text: "Step away"
          action: "leave"

  lich_nexus_exit:
    name: "Nexus Portal"
    type: "encounter"
    description: "A portal back to the living world"
    sprite: "lich_nexus_exit"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 4
    dialogue:
      greeting: "The portal flickers with a path away from the liches' hall."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Leave the nexus"
          action: "enter_map"
          map: "highlands"
        - text: "Stay inside"
          action: "leave"

  seabright_gate:
    name: "Seabright Gate"
    type: "encounter"
    description: "A stone road gate leading toward the sea city of Seabright"
    sprite: "city_exterior"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 6
    dialogue:
      greeting: "Beyond the forest road, Seabright's gate stands open. You hear gulls, market bells, and the sea wind beyond the arch."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Enter Seabright"
          action: "enter_map"
          map: "city"
        - text: "Stay in the forest"
          action: "leave"

  # Invisible gate NPCs for the forest↔highlands portal. sprite "" renders
  # nothing at all; ground_tile paints the portal-stream tile under the gate so
  # the party steps onto shimmering water. Triggered with the interact key.
  portal_gate_highlands:
    name: "Mountain Path"
    type: "encounter"
    description: "A shimmer over the stream — a path toward the misty highlands"
    sprite: ""
    ground_tile: "forest_portal_stream"
    transparent: true
    size_multiplier: 1
    dialogue:
      greeting: "The water shimmers with a cold mountain light. A path to the misty highlands opens beyond."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Travel to the highlands"
          action: "enter_map"
          map: "highlands"
        - text: "Stay in the forest"
          action: "leave"

  portal_gate_forest:
    name: "Forest Path"
    type: "encounter"
    description: "The shimmer that leads back down to the forest"
    sprite: ""
    ground_tile: "highlands_stream"
    transparent: true
    size_multiplier: 1
    dialogue:
      greeting: "The mountain mist parts, revealing the green path back down to the forest."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Return to the forest"
          action: "enter_map"
          map: "forest"
        - text: "Stay in the highlands"
          action: "leave"

  city_exit:
    name: "City Gate"
    type: "encounter"
    description: "The main gate back to the forest road"
    sprite: "city_gate"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 4
    dialogue:
      greeting: "The gate opens back onto the forest path."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Return to the forest"
          action: "enter_map"
          map: "forest"
        - text: "Stay in Seabright"
          action: "leave"

  city_weapon_shop:
    name: "Seabright Arms"
    type: "merchant"
    description: "A weapon shop with upgraded blades, bows and staves"
    sprite: "merchant"
    size_multiplier: 4
    sell_available: true
    dialogue:
      greeting: "Starter steel won't last the road. These will."
    # Stock is one class-appropriate upgrade above the starter loadout —
    # nothing here matches an item the party already carries at L1.
    inventory:
      - type: "weapon"
        name: "Silver Sword"
        cost: 800
        quantity: 2
      - type: "weapon"
        name: "Steel Mace"
        cost: 550
        quantity: 2
      - type: "weapon"
        name: "Battle Staff"
        cost: 400
        quantity: 2
      - type: "weapon"
        name: "Elven Bow"
        cost: 750
        quantity: 1
      - type: "weapon"
        name: "Throwing Knife"
        cost: 200
        quantity: 3

  city_potion_shop:
    name: "Harbor Remedies"
    type: "merchant"
    description: "A small apothecary selling road medicine"
    sprite: "merchant"
    size_multiplier: 4
    sell_available: true
    dialogue:
      greeting: "Careful bottles, clear labels, no mystery brews."
    inventory:
      - type: "potion"
        name: "Health Potion"
        cost: 50
        quantity: 12
      - type: "potion"
