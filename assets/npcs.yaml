# UgaTaima NPC Configuration
#
# NPC TYPES:
# - spell_trader: Teaches spells to party members for gold
# - skill_trainer: Trains skills (already implemented in code)
# - merchant: Sells items
# - quest_giver: Gives quests
#
# PLACEMENT FORMAT:
# Use [npc:key] in map files to place NPCs
# The key corresponds to an NPC definition in this file

npcs:
  # Spell Traders - NPCs who teach spells for gold
  spell_trader_mage:
    name: "Mystic Trader Eldrich"
    type: "spell_trader"
    description: "A mysterious mage who trades arcane knowledge for gold"
    sprite: "elf_warrior"
    size_multiplier: 4
    dialogue:
      greeting: "Greetings, traveler! I deal in magical knowledge. Choose a character and spell to learn."
      insufficient_gold: "You need %d gold to learn this spell."
      already_known: "%s already knows this spell."
      success: "The knowledge flows into %s's mind. Use it wisely!"

    # Self & divine magic — every Body, Mind and Spirit spell. Each entry authors
    # only its shop price; name/school/level/requirements are backfilled from
    # spells.yaml (see backfillTraderSpells), so this stays in sync automatically.
    spells:
      # Body
      heal: { cost: 150 }
      heal_other: { cost: 500 }
      harm: { cost: 300 }
      mass_heal: { cost: 800 }
      # Mind
      awaken: { cost: 300 }
      mind_blast: { cost: 350 }
      psychic_shock: { cost: 1200 }
      charm: { cost: 1200 }
      # Spirit
      bless: { cost: 700 }
      spirit_lash: { cost: 300 }
      heroism: { cost: 900 }
      raise_dead: { cost: 1500 }

  # Spell trader for testing
  mtrader0:
    name: "Mystic Trader Aldric"
    type: "spell_trader"
    description: "A wise old mage who trades in magical knowledge"
    sprite: "human"
    size_multiplier: 4
    dialogue:
      greeting: "Greetings, traveler! I possess ancient spells for those with coin."
      insufficient_gold: "You lack the gold required for this knowledge."
      already_known: "This character already knows that spell."
      success: "The magical knowledge has been imparted. Use it wisely!"
      active_message: "The wolves still prowl the forest. Silence every last howl and I will bridge the lake."
      completed_message: "The forest is quiet at last! The bridge to Eldrich's perch is laid - and here is your due."
      visited_message: "Cross my bridge and give Eldrich my regards."
      choice_prompt: "Aldric glances toward the lake."
      choices:
        - text: "Ask about the wolves"
          action: "give_quest"
          quest_id: "forest_wolf_cull"
        - text: "Claim your reward"
          action: "turn_in_quest"
          quest_id: "forest_wolf_cull"
        - text: "Leave"
          action: "leave"
    # Corner trader: sells only Walk on Water, at a flat 500 gold.
    spells:
      walk_on_water:
        cost: 500

  # Example of other NPC types for future expansion
  merchant_general:
    name: "Trader Marcus"
    type: "merchant"
    description: "A general goods merchant with basic supplies"
    sprite: "elf"
    size_multiplier: 4
    dialogue:
      greeting: "Welcome to my shop! What can I get for you today?"
    inventory:
      - type: "potion"
        name: "Health Potion"
        cost: 50
        quantity: 10
      - type: "weapon"
        name: "Iron Sword"
        cost: 200
        quantity: 3

  desert_merchant:
    name: "Sahim the Wayfarer"
    type: "merchant"
    description: "A desert trader with a keen eye for useful gear"
    sprite: "merchant"
    size_multiplier: 4
    sell_available: true
    dialogue:
      greeting: "Spare tools and trinkets? I pay fair coin."

  quest_elder:
    name: "Village Elder Aldwin"
    type: "quest_giver"
    description: "The wise village elder with knowledge of ancient secrets"
    sprite: "elf_warrior"
    dialogue:
      greeting: "Young adventurer, I have a task that requires your skills..."

  shipwreck_bandit_camp:
    name: "Abandoned Shipwreck"
    type: "encounter"
    description: "An old shipwreck that appears abandoned, but sounds come from within"
    sprite: "shipwreck"
    render_type: "environment_sprite"
    transparent: true
    dialogue:
      greeting: "You approach an old shipwreck half-buried in the ground. Through gaps in the rotted hull, you hear voices and see flickering firelight. It seems bandits have made this wreck their hideout."
      visited_message: "The shipwreck appears empty now."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Leave quietly"
          action: "leave"
        - text: "Attack the bandits"
          action: "combat"
    encounter:
      type: "bandit_camp"
      start_message: "Bandits emerge from the shipwreck to attack!"
      quest_id: "shipwreck_bandits"
      quest_name: "Clear the Shipwreck"
      quest_description: "Bandits have made a hideout in an old shipwreck. Defeat them all to claim the bounty."
      monsters:
        - type: "bandit"
          count_min: 2
          count_max: 5
      rewards:
        gold: 2000
        experience: 500
        completion_message: "The shipwreck bandits have been defeated!"
      first_visit_only: true

  # Dragon statues (desert corners). Unique names so save/load tracks each
  # spent statue independently. The "summon" choice is injected at dialog-open
  # from the statuettes the party holds; only "Leave" is static here.
  dragon_statue_black:
    name: "Black Dragon Statue"
    type: "encounter"
    description: "A coiled obsidian dragon, mouth agape as if mid-roar"
    sprite: "dragon_statue"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 1.0
    hide_when_visited: true
    dialogue:
      greeting: "The statue's hollow eyes seem to follow you. Carved runes hint that a dragon statuette could wake what sleeps in the stone."
      choice_prompt: "Place a statuette?"
      choices:
        - text: "Leave"
          action: "leave"
    summons:
      - statuette: "Black Dragon Statuette"
        monster: "dragon"
        label: "Black"

  dragon_statue_red:
    name: "Red Dragon Statue"
    type: "encounter"
    description: "A rearing crimson dragon wrought in dark stone"
    sprite: "dragon_statue"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 1.0
    hide_when_visited: true
    dialogue:
      greeting: "The statue's hollow eyes seem to follow you. Carved runes hint that a dragon statuette could wake what sleeps in the stone."
      choice_prompt: "Place a statuette?"
      choices:
        - text: "Leave"
          action: "leave"
    summons:
      - statuette: "Red Dragon Statuette"
        monster: "dragon_red"
        label: "Red"

  dragon_statue_green:
    name: "Green Dragon Statue"
    type: "encounter"
    description: "A serpentine dragon of mossy green stone"
    sprite: "dragon_statue"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 1.0
    hide_when_visited: true
    dialogue:
      greeting: "The statue's hollow eyes seem to follow you. Carved runes hint that a dragon statuette could wake what sleeps in the stone."
      choice_prompt: "Place a statuette?"
      choices:
        - text: "Leave"
          action: "leave"
    summons:
      - statuette: "Green Dragon Statuette"
        monster: "dragon_green"
        label: "Green"

  dragon_statue_gold:
    name: "Gold Dragon Statue"
    type: "encounter"
    description: "A gilded dragon that glints even in the shade"
    sprite: "dragon_statue"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 1.0
    hide_when_visited: true
    dialogue:
      greeting: "The statue's hollow eyes seem to follow you. Carved runes hint that a dragon statuette could wake what sleeps in the stone."
      choice_prompt: "Place a statuette?"
      choices:
        - text: "Leave"
          action: "leave"
    summons:
      - statuette: "Gold Dragon Statuette"
        monster: "dragon_gold"
        label: "Gold"

  prison:
    name: "Mountain Prison"
    type: "encounter"
    description: "A grim stockade of black iron, two elf jailers pacing the gate"
    sprite: "prison"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 1.0
    dialogue:
      greeting: "Two champions languish in this mountain stockade, guarded by a pair of elf swordsmen. The jailers turn on you the moment you approach the bars."
      visited_message: "The cages hang open and empty — the freed champions have gone to await you at the tavern."
      choice_prompt: "Free the prisoners?"
      choices:
        - text: "Break them out (fight the jailers)"
          action: "combat"
        - text: "Leave"
          action: "leave"
    encounter:
      type: "prison_break"
      first_visit_only: true
      start_message: "The elf jailers draw steel!"
      monsters:
        - type: "elf_swordsman"
          count_min: 2
          count_max: 2
      rewards:
        experience: 0
        completion_message: "The cages spring open — the imprisoned champions head for the tavern to await you."
        frees_captives: true

  tavern:
    name: "The Wandering Wyvern"
    type: "encounter"
    description: "A cozy timber tavern; off-duty heroes nurse their drinks here"
    sprite: "tavern"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 1.0
    dialogue:
      greeting: "The keeper nods. 'Beds upstairs, stew on the fire, and your benched companions at the corner table. What'll it be?'"
      choice_prompt: "The keeper waits."
      choices:
        - text: "Manage roster"
          action: "open_roster"
        - text: "Rest the night (200 gold)"
          action: "tavern_rest"
          cost: 200
        - text: "Buy rations (+5 food, 1000 gold)"
          action: "buy_food"
          cost: 1000
          amount: 5
        - text: "Leave"
          action: "leave"

  mage_tower:
    name: "Mage Tower"
    type: "encounter"
    description: "A slender spire of pale stone, humming faintly with warded power"
    sprite: "mage_tower"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 1.0
    dialogue:
      greeting: "A voice echoes from the tower's heights: 'Only one who has broken the Lich King may be raised to Archmage and command the Light. Will you take the trial?'"
      active_message: "The voice stirs again: 'The Lich King still draws breath. Return when the deed is done.'"
      completed_message: "The wards blaze bright: 'You have broken the Lich King. Step forward and be raised to Archmage.'"
      visited_message: "The tower stands quiet now — an Archmage walks among you."
      choice_prompt: "The Mage Tower awaits."
      choices:
        - text: "Accept the trial (slay the Lich King)"
          action: "give_quest"
          quest_id: "archmage_trial"
        - text: "I have slain the Lich King"
          action: "turn_in_quest"
          quest_id: "archmage_trial"
        - text: "Leave"
          action: "leave"

  dragon_cliffs_ranger:
    name: "Maera Cliffwatch"
    type: "quest_giver"
    description: "A wind-battered scout who watches the dragon cliffs for raiders and trolls"
    sprite: "dragon_cliffs_ranger"
    size_multiplier: 4
    dialogue:
      greeting: "Keep low when the wind shifts. The trolls use the cliff mist as cover, and they are getting bold near the bridge stones."
      active_message: "Still too many trolls on the ridge. Thin them out and the bridge approaches are ours again."
      completed_message: "The bridge stones are quiet for the first time in weeks. You've earned your due — let me settle up."
      visited_message: "The cliffs hold. Safe travels, friend."
      choice_prompt: "Maera studies the ridgeline."
      choices:
        - text: "Ask about the troll raids"
          action: "give_quest"
          quest_id: "dragon_cliffs_troll_cull"
        - text: "Claim your reward"
          action: "turn_in_quest"
          quest_id: "dragon_cliffs_troll_cull"
        - text: "Leave"
          action: "leave"

  dragon_cliffs_bone_hermit:
    name: "Old Varric Bone-Speaker"
    type: "quest_giver"
    description: "A hermit draped in dragon teeth and old cliff charms"
    sprite: "dragon_cliffs_bone_hermit"
    size_multiplier: 4
    dialogue:
      greeting: "The bones remember flame. Something below the cliffs has taught the mountain mages to listen to it."
      active_message: "The rite still hums in the rock. The mages yet breathe — silence them, and the bones will rest."
      completed_message: "The humming has stopped. You broke the rite. Take what the bones owe you."
      visited_message: "The dragon-bones are quiet at last. Go well."
      choice_prompt: "The hermit taps his dragon-bone staff."
      choices:
        - text: "Ask about the ember rites"
          action: "give_quest"
          quest_id: "dragon_cliffs_ember_rites"
        - text: "Claim your reward"
          action: "turn_in_quest"
          quest_id: "dragon_cliffs_ember_rites"
        - text: "Leave"
          action: "leave"

  dragon_cliffs_bone_lair:
    name: "Bone-Maw Lair"
    type: "encounter"
    description: "A cliff cave framed by fossilized dragon jaws and scattered ribs"
    sprite: "dragon_cliffs_bone_lair"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 1.0
    dialogue:
      greeting: "The cave exhales a cold animal breath. Deep inside, claws scrape stone."
      visited_message: "The Bone-Maw is silent now — only scorched bones and a cold draft remain."
      choice_prompt: "Enter the Bone-Maw?"
      choices:
        - text: "Enter the lair"
          action: "combat"
        - text: "Back away"
          action: "leave"
    encounter:
      type: "dragon_lair"
      first_visit_only: true
      start_message: "A green dragon coils out of the bone-strewn dark!"
      quest_id: "dragon_cliffs_bone_lair"
      quest_name: "Bone-Maw Lair"
      quest_description: "Clear the bone-framed dragon lair in the Dragon Cliffs."
      monsters:
        - type: "dragon_green"
          count_min: 1
          count_max: 1
      rewards:
        gold: 1500
        experience: 1500
        completion_message: "The Bone-Maw falls silent."

  dragon_cliffs_ember_lair:
    name: "Ember-Heart Lair"
    type: "encounter"
    description: "A basalt dragon den split by glowing ember cracks"
    sprite: "dragon_cliffs_ember_lair"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 1.0
    dialogue:
      greeting: "Heat rolls from the cave mouth. Something vast shifts behind the red glow."
      visited_message: "The Ember-Heart has cooled to black stone — the cavern lies dark and still."
      choice_prompt: "Enter the Ember-Heart?"
      choices:
        - text: "Enter the lair"
          action: "combat"
        - text: "Back away"
          action: "leave"
    encounter:
      type: "dragon_lair"
      first_visit_only: true
      start_message: "A red dragon erupts from the ember-lit cavern!"
      quest_id: "dragon_cliffs_ember_lair"
      quest_name: "Ember-Heart Lair"
      quest_description: "Clear the burning dragon lair in the Dragon Cliffs."
      monsters:
        - type: "dragon_red"
          count_min: 1
          count_max: 1
      rewards:
        gold: 2000
        experience: 1500
        completion_message: "The Ember-Heart cools to black stone."

  abandoned_church:
    name: "Abandoned Church"
    type: "encounter"
    description: "A ruined stone church whose broken doorway descends into darkness"
    sprite: "abandoned_church"
    render_type: "environment_sprite"
    transparent: true
    dialogue:
      greeting: "The abandoned church stands silent among the trees. Villagers say the old priest locked the doors after the crypt bells rang by themselves, and no one who entered after dusk returned unchanged."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Enter the church"
          action: "enter_map"
          map: "church"
        - text: "Leave it alone"
          action: "leave"

  abandoned_church_exit:
    name: "Church Entrance"
    type: "encounter"
    description: "The cold doorway back to the forest"
    sprite: "church_exit"
    render_type: "environment_sprite"
    transparent: true
    dialogue:
      greeting: "Cold air moves through the doorway behind you. The forest path is still visible beyond the ruined arch."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Return to the forest"
          action: "enter_map"
          map: "forest"
        - text: "Stay inside"
          action: "leave"

  pyramid_entrance:
    name: "Ancient Pyramid"
    type: "encounter"
    description: "A sun-baked pyramid with a narrow stairway descending into darkness"
    sprite: "pyramid_entrance"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 1.0
    dialogue:
      greeting: "The pyramid's entrance yawns open beneath worn sandstone blocks. Dry air carries the smell of dust, pitch, and something sealed too long."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Enter the pyramid"
          action: "enter_map"
          map: "pyramid_1"
        - text: "Leave it alone"
          action: "leave"

  pyramid_exit:
    name: "Pyramid Entrance"
    type: "encounter"
    description: "The stairway back out of the pyramid"
    sprite: "pyramid_stairs_up"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 1.0
    dialogue:
      greeting: "Warm daylight spills down the sandstone stairs behind you."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Leave the pyramid"
          action: "enter_map"
          map: "desert"
        - text: "Stay inside"
          action: "leave"

  pyramid_stairs_to_1:
    name: "Stairs to Level 1"
    type: "encounter"
    description: "Sandstone stairs leading upward"
    sprite: "pyramid_stairs_up"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 1.0
    dialogue:
      greeting: "The stairs climb toward the upper chambers."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Go to level 1"
          action: "enter_map"
          map: "pyramid_1"
        - text: "Stay here"
          action: "leave"

  pyramid_stairs_to_2:
    name: "Stairs to Level 2"
    type: "encounter"
    description: "Sandstone stairs leading deeper"
    sprite: "pyramid_stairs_down"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 1.0
    dialogue:
      greeting: "The stairs descend into a colder, darker level of the pyramid."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Go to level 2"
          action: "enter_map"
          map: "pyramid_2"
        - text: "Stay here"
          action: "leave"

  pyramid_stairs_to_3:
    name: "Stairs to the Sanctum"
    type: "encounter"
    description: "A narrow stairway toward the sealed sanctum"
    sprite: "pyramid_stairs_down"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 1.0
    dialogue:
      greeting: "A painted stairway falls away into a chamber marked by four dragon seals."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Go to the sanctum"
          action: "enter_map"
          map: "pyramid_3"
        - text: "Stay here"
          action: "leave"

  lich_nexus_entrance:
    name: "Lich Nexus"
    type: "encounter"
    description: "A black stone arch humming with trapped souls"
    sprite: "lich_nexus_entrance"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 1.0
    dialogue:
      greeting: "Green-violet fire coils inside the arch. Beyond it, you hear the slow chant of dead kings."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Enter the nexus"
          action: "enter_map"
          map: "lich_nexus"
        - text: "Step away"
          action: "leave"

  lich_nexus_exit:
    name: "Nexus Portal"
    type: "encounter"
    description: "A portal back to the living world"
    sprite: "lich_nexus_exit"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 1.0
    dialogue:
      greeting: "The portal flickers with a path away from the liches' hall."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Leave the nexus"
          action: "enter_map"
          map: "highlands"
        - text: "Stay inside"
          action: "leave"

  seabright_gate:
    name: "Seabright Gate"
    type: "encounter"
    description: "A stone road gate leading toward the sea city of Seabright"
    sprite: "city_exterior"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 1.0
    dialogue:
      greeting: "Beyond the forest road, Seabright's gate stands open. You hear gulls, market bells, and the sea wind beyond the arch."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Enter Seabright"
          action: "enter_map"
          map: "city"
        - text: "Stay in the forest"
          action: "leave"

  # --- Seabright Culverts (sewer dungeon) ---
  culverts_entrance:
    name: "Culvert Outflow"
    type: "encounter"
    description: "A great barred storm-drain venting into the harbor"
    sprite: "culvert_outlet"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 1.0
    dialogue:
      greeting: "A grated outflow descends beneath Seabright into the city culverts. Far down in the dark, something gold glitters."
      choice_prompt: "Descend into the culverts?"
      choices:
        - text: "Enter the culverts"
          action: "enter_map"
          map: "culverts"
        - text: "Stay in the city"
          action: "leave"

  culverts_exit:
    name: "Outflow Grate"
    type: "encounter"
    description: "The barred outflow back up to Seabright harbor"
    sprite: "culvert_outlet"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 1.0
    dialogue:
      greeting: "Daylight filters down through the outflow grate — the way back up to Seabright."
      choice_prompt: "Leave the culverts?"
      choices:
        - text: "Climb back to Seabright"
          action: "enter_map"
          map: "city"
        - text: "Stay below"
          action: "leave"

  culverts_oldman:
    name: "Sewerman Garran"
    type: "quest_giver"
    description: "A stooped old sewer-keeper who knows the culverts' every drip"
    sprite: "dragon_cliffs_bone_hermit"
    size_multiplier: 4
    dialogue:
      greeting: "Mind the gold glint in the dark, traveler. The Golden Thief Bug hoards down here — but it won't stand and fight; it blinks away the moment you close in. Shut the seven sluice valves and the flood drains from its lair. Cornered in the dry, it'll finally turn on you."
      active_message: "Valves still gushing. Seven of them — shut every one and the bug's lair drains dry."
      completed_message: "The channels run dry; the Thief Bug's nowhere left to skitter. Here's for your trouble — now go corner the thing."
      visited_message: "Dry as old bone down there now. Mind that bug's bite."
      choice_prompt: "Garran leans on his hook-pole."
      choices:
        - text: "Ask about the Golden Thief Bug"
          action: "give_quest"
          quest_id: "culverts_valves"
        - text: "Claim your reward"
          action: "turn_in_quest"
          quest_id: "culverts_valves"
        - text: "Leave"
          action: "leave"

  # Seven sluice valves. Distinct keys/names so each remembers being shut
  # independently (NPC Visited is save-tracked by name). Dialogue is shared via a
  # YAML anchor — it's a read-only template; only npc.Visited mutates at runtime.
  culvert_valve_1:
    name: "Sluice Valve I"
    type: "encounter"
    sprite: "culvert_valve"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 0.5
    steam_when_visited: true
    dialogue: &valve_dialogue
      greeting: "A rust-caked sluice valve, half-open. Water roars through the channel below."
      visited_message: "The valve is wrenched shut; the channel runs dry."
      choice_prompt: "Close the valve?"
      choices:
        - text: "Heave the wheel shut"
          action: "close_valve"
          quest_id: "culverts_valves"
        - text: "Leave it"
          action: "leave"
  culvert_valve_2:
    name: "Sluice Valve II"
    type: "encounter"
    sprite: "culvert_valve"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 0.5
