# UgaTaima NPC Configuration
#
# NPC TYPES:
# - spell_trader: Teaches spells to party members for gold
# - skill_trainer: Trains skills (already implemented in code)
# - merchant: Sells items
# - quest_giver: Gives quests
#
# PLACEMENT FORMAT:
# Use [npc:key] in map files to place NPCs
# The key corresponds to an NPC definition in this file

npcs:
  # Spell Traders - NPCs who teach spells for gold
  spell_trader_mage:
    name: "Priestess Liora"
    type: "spell_trader"
    description: "A serene priestess in white and gold, keeper of a lakeside shrine, who teaches the divine arts of body, mind and spirit"
    sprite: "priestess_spell_merchant"
    render_category: animated
    size_class: person
    dialogue:
      greeting: "Peace, traveler. Few cross the bridge to my shrine; the Light rewards those who do. I teach the arts of body, mind, and spirit - choose a soul to bless."
      insufficient_gold: "Devotion is not bought with empty hands. This teaching asks %d gold."
      already_known: "%s already carries this prayer in their heart."
      success: "The Light settles into %s. Wield it gently, and it will not fail you."

    # Self & divine magic - every Body, Mind and Spirit spell. Each entry authors
    # only its shop price; name/school/level/requirements are backfilled from
    # spells.yaml (see backfillTraderSpells), so this stays in sync automatically.
    spells:
      # Body
      heal: { cost: 150 }
      heal_other: { cost: 500 }
      harm: { cost: 300 }
      mass_heal: { cost: 800 }
      # Mind
      awaken: { cost: 300 }
      mind_blast: { cost: 350 }
      psychic_shock: { cost: 1200 }
      charm: { cost: 1200 }
      # Spirit
      bless: { cost: 700 }
      spirit_lash: { cost: 300 }
      heroism: { cost: 900 }
      raise_dead: { cost: 1500 }

  # Spell trader for testing
  mtrader0:
    name: "Apprentice Mira"
    type: "spell_trader"
    description: "An eager young hedge-mage camped at the forest's edge, peddling the few charms she has mastered while she dreams of greater teaching"
    sprite: "beginner_spell_merchant"
    render_category: animated
    size_class: person
    dialogue:
      greeting: "Oh - a real adventuring party! I'm Mira. I've not mastered much yet, but what I have I'll gladly sell. Pick a companion and I'll show you my one good trick."
      insufficient_gold: "Ah - that's %d gold, and your purse is a little light. Come back when it's heavier."
      already_known: "%s already knows that one! You're ahead of me there."
      success: "There - %s has it. Mind the gestures; I botched that spell for a month."
      quest_greeting: "Between us? I'm only camped out here because I'm trying to reach Priestess Liora's shrine across the lake - and I can't finish my bridge with wolves at my back every night. Lend a hand?"
      active_message: "The wolves are still out there - you can hear them at dusk. Quiet every last one and I'll have the lake bridge finished, I swear it."
      completed_message: "The forest's gone silent - you did it! The bridge is laid at last, all the way to Priestess Liora's shrine across the water. Here's your reward, and my thanks. Go meet her - tell her Mira sent you!"
      visited_message: "Cross my bridge whenever you like. Give Priestess Liora my respects - one day I'll study under her myself."
      choice_prompt: "Mira fidgets with a half-finished plank."
      choices:
        - text: "Why are you building a bridge?"
          action: "info"
          response: "Across the lake there's a shrine - Priestess Liora teaches the divine arts there, body and mind and spirit. Real magic, not my hedge-tricks. I've been trying to reach her for a season. But the only crossing is this bridge I'm building, and I can't lay a plank with wolves at my back every night."
          choices:
            - text: "What's the trouble with the wolves?"
              action: "info"
              response: "A whole pack, gone bold and hungry - they own this forest after dark. I've lost tools, near lost a hand. If your party thinned them out, truly silenced the lot, I'd have the bridge finished in days. Do that, and the crossing to Liora is yours as much as mine."
              choices:
                - text: "Consider it done. We'll cull the pack."
                  action: "give_quest"
                  quest_id: "forest_wolf_cull"
                - text: "Let me think."
                  action: "back"
            - text: "Back."
              action: "back"
        - text: "We'll silence the wolves for you."
          action: "give_quest"
          quest_id: "forest_wolf_cull"
        - text: "Claim your reward"
          action: "turn_in_quest"
          quest_id: "forest_wolf_cull"
        - text: "Leave"
          action: "leave"
    # Corner trader: sells only Walk on Water, at a flat 500 gold.
    spells:
      walk_on_water:
        cost: 500

  # Example of other NPC types for future expansion
  merchant_general:
    name: "Trader Aelwen"
    type: "merchant"
    description: "A graceful elven trader in green robes, healing vials at her belt, dealing in the road staples a far-walking party always forgets"
    sprite: "elf"
    render_category: animated
    size_class: person
    dialogue:
      greeting: "Well met. I'm Aelwen - I don't deal in wonders, only the staples that keep a party walking. What did you forget to pack?"
    inventory:
      - type: "potion"
        name: "Health Potion"
        cost: 50
        quantity: 10
      - type: "weapon"
        name: "Iron Sword"
        cost: 200
        quantity: 3

  desert_merchant:
    name: "Esna the Wayfarer"
    type: "merchant"
    description: "A young traveling peddler - potion-tray at her hip, bedroll on her back - who walks the long desert routes and pays fair coin for cast-off gear"
    sprite: "merchant"
    render_category: animated
    size_class: person
    sell_available: true
    dialogue:
      greeting: "Esna's the name - I walk the long routes most folk won't, tray and bedroll and all. I pay fair coin for spare gear. Anything you'd rather not carry?"

  card_collector:
    name: "Cartomancer Odette"
    type: "card_collector"
    description: "A monocled scholar of monster cards, pouches of stamped parchment at every belt-loop, set up under a sun-awning in the dunes"
    sprite: "card_collector"
    render_category: animated
    size_class: person
    dialogue:
      greeting: "Monster cards! Slot one into your collection and the whole party shares its power - or pull one back out. Only I know the trick of pinning them."

  quest_elder:
    name: "Warden Sylvaine"
    type: "quest_giver"
    description: "A keen-eyed elven warden in green and leather, blade at her hip, who keeps watch over the roads out of the village"
    sprite: "elf_warrior"
    size_class: person
    render_category: animated
    dialogue:
      greeting: "Hold a moment, travelers. I ward the roads out of here, and of late they run to old and hungry places. Walk them with open eyes - the land remembers more than it forgives."

  shipwreck_bandit_camp:
    name: "Abandoned Shipwreck"
    type: "encounter"
    description: "An old shipwreck that appears abandoned, but sounds come from within"
    sprite: "shipwreck"
    size_tiles: 1.0
    render_category: scenery
    transparent: true
    dialogue:
      greeting: "You approach an old shipwreck half-buried in the ground. Through gaps in the rotted hull, you hear voices and see flickering firelight. It seems bandits have made this wreck their hideout."
      visited_message: "The shipwreck appears empty now."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Leave quietly"
          action: "leave"
        - text: "Attack the bandits"
          action: "combat"
    encounter:
      type: "bandit_camp"
      start_message: "Bandits emerge from the shipwreck to attack!"
      quest_id: "shipwreck_bandits"
      quest_name: "Clear the Shipwreck"
      quest_description: "Bandits have made a hideout in an old shipwreck. Defeat them all to claim the bounty."
      monsters:
        - type: "bandit"
          count_min: 2
          count_max: 5
      rewards:
        gold: 2000
        experience: 500
        completion_message: "The shipwreck bandits have been defeated!"
      first_visit_only: true

  # Dragon statues (desert corners). Unique names so save/load tracks each
  # spent statue independently. The "summon" choice is injected at dialog-open
  # from the statuettes the party holds; only "Leave" is static here.
  dragon_statue_black:
    name: "Black Dragon Statue"
    type: "encounter"
    description: "A coiled obsidian dragon, mouth agape as if mid-roar"
    sprite: "dragon_statue"
    render_category: scenery
    transparent: true
    size_tiles: 1.0
    hide_when_visited: true
    dialogue:
      greeting: "The statue's hollow eyes seem to follow you. Carved runes hint that a dragon statuette could wake what sleeps in the stone."
      choice_prompt: "Place a statuette?"
      choices:
        - text: "Leave"
          action: "leave"
    summons:
      - statuette: "Black Dragon Statuette"
        monster: "elder_dragon"
        label: "Black"

  dragon_statue_red:
    name: "Red Dragon Statue"
    type: "encounter"
    description: "A rearing crimson dragon wrought in dark stone"
    sprite: "dragon_statue"
    render_category: scenery
    transparent: true
    size_tiles: 1.0
    hide_when_visited: true
    dialogue:
      greeting: "The statue's hollow eyes seem to follow you. Carved runes hint that a dragon statuette could wake what sleeps in the stone."
      choice_prompt: "Place a statuette?"
      choices:
        - text: "Leave"
          action: "leave"
    summons:
      - statuette: "Red Dragon Statuette"
        monster: "elder_dragon_red"
        label: "Red"

  dragon_statue_green:
    name: "Green Dragon Statue"
    type: "encounter"
    description: "A serpentine dragon of mossy green stone"
    sprite: "dragon_statue"
    render_category: scenery
    transparent: true
    size_tiles: 1.0
    hide_when_visited: true
    dialogue:
      greeting: "The statue's hollow eyes seem to follow you. Carved runes hint that a dragon statuette could wake what sleeps in the stone."
      choice_prompt: "Place a statuette?"
      choices:
        - text: "Leave"
          action: "leave"
    summons:
      - statuette: "Green Dragon Statuette"
        monster: "elder_dragon_green"
        label: "Green"

  dragon_statue_gold:
    name: "Gold Dragon Statue"
    type: "encounter"
    description: "A gilded dragon that glints even in the shade"
    sprite: "dragon_statue"
    render_category: scenery
    transparent: true
    size_tiles: 1.0
    hide_when_visited: true
    dialogue:
      greeting: "The statue's hollow eyes seem to follow you. Carved runes hint that a dragon statuette could wake what sleeps in the stone."
      choice_prompt: "Place a statuette?"
      choices:
        - text: "Leave"
          action: "leave"
    summons:
      - statuette: "Gold Dragon Statuette"
        monster: "elder_dragon_gold"
        label: "Gold"

  prison:
    name: "Mountain Prison"
    type: "encounter"
    description: "A grim stockade of black iron, two elf jailers pacing the gate"
    sprite: "prison"
    render_category: scenery
    transparent: true
    size_tiles: 1.0
    dialogue:
      greeting: "Two champions languish in this mountain stockade, guarded by a pair of elf swordsmen. The jailers turn on you the moment you approach the bars."
      visited_message: "The cages hang open and empty - the freed champions have gone to await you at the tavern."
      choice_prompt: "Free the prisoners?"
      choices:
        - text: "Break them out (fight the jailers)"
          action: "combat"
        - text: "Leave"
          action: "leave"
    encounter:
      type: "prison_break"
      first_visit_only: true
      start_message: "The elf jailers draw steel!"
      monsters:
        - type: "elf_swordsman"
          count_min: 2
          count_max: 2
      rewards:
        experience: 0
        completion_message: "The cages spring open - the imprisoned champions head for the tavern to await you."
        frees_captives: true

  tavern:
    name: "The Wandering Wyvern"
    type: "encounter"
    description: "A cozy timber tavern; off-duty heroes nurse their drinks here"
    sprite: "tavern"
    render_category: scenery
    transparent: true
    size_tiles: 1.0
    dialogue:
      greeting: "The keeper nods. 'Beds upstairs, stew on the fire, and your benched companions at the corner table. What'll it be?'"
      choice_prompt: "The keeper waits."
      choices:
        - text: "Manage roster"
          action: "open_roster"
        - text: "Manage your stash"
          action: "manage_stash"
        - text: "Rest the night (25 gold)"
          action: "tavern_rest"
          cost: 25
        - text: "Buy rations (+5 food, 1000 gold)"
          action: "buy_food"
          cost: 1000
          amount: 5
        - text: "Leave"
          action: "leave"

  mage_tower:
    name: "Mage Tower"
    type: "encounter"
    description: "A slender spire of pale stone, humming faintly with warded power"
    sprite: "mage_tower"
    render_category: landmark
    transparent: true
    size_tiles: 2.0
    rejects_lich: true
    dialogue:
      greeting: "A voice rings down from the tower's heights, neither man's nor woman's: 'You feel the wards part for you. Few do. Speak, then - there is a trial here for those bold enough to be raised.'"
      active_message: "The voice stirs again, cooler now: 'The Lich King still draws breath, and so the throne of Archmage stays empty. Return when the deed is done.'"
      completed_message: "The wards blaze white: 'You have broken the Lich King. The Light has waited long for hands worthy of it. Step forward, and be raised to Archmage.'"
      visited_message: "The tower stands quiet now - its highest seat is filled, and an Archmage walks among you."
      choice_prompt: "The Mage Tower's wards hum, waiting."
      choices:
        - text: "What trial does the tower offer?"
          action: "info"
          response: "'The seat of Archmage has stood empty since the Lich King rose. The Light will crown no one who has not first unmade him - for what use is mastery that flees the dark? Break the Lich King upon his nexus, return alive, and one among you will be raised to command the Light itself.'"
          choices:
            - text: "What does becoming Archmage grant?"
              action: "info"
              response: "'Command of the highest Light: the prayers no trader will sell and no shrine will teach. But the Light tests before it gives. It will not bind itself to the undead, nor to the unready - only to one who has already walked into the Lich King's dark and walked back out. Prove that, and the gift is yours.'"
              choices:
                - text: "We accept. The Lich King will fall."
                  action: "give_quest"
                  quest_id: "archmage_trial"
                - text: "Not yet."
                  action: "back"
            - text: "Back."
              action: "back"
        - text: "Accept the trial (slay the Lich King)"
          action: "give_quest"
          quest_id: "archmage_trial"
        - text: "I have slain the Lich King"
          action: "turn_in_quest"
          quest_id: "archmage_trial"
        - text: "Leave"
          action: "leave"

  dragon_cliffs_ranger:
    name: "Maera Cliffwatch"
    type: "quest_giver"
    description: "A wind-battered scout who watches the dragon cliffs for raiders and trolls"
    sprite: "dragon_cliffs_ranger"
    render_category: animated
    size_class: person
    dialogue:
      greeting: "Down - keep low when the wind shifts. Good. You've a steadier hand than the last lot who came up this trail. I'm Maera; I watch these cliffs so the bridge towns below get a warning before the trouble does. And lately there's trouble."
      active_message: "Still too many of them on the ridge. Thin the pack and the bridge approaches are ours again - I'll know the moment the mist clears."
      completed_message: "The bridge stones are quiet for the first time in weeks. I watched you work the ridge - clean, no wasted blood. You've earned your due; let me settle up."
      visited_message: "The cliffs hold, and the towns below sleep easier. Safe travels, friend - mind the wind."
      choice_prompt: "Maera studies the ridgeline."
      choices:
        - text: "What kind of trouble?"
          action: "info"
          response: "Trolls. They come up out of the gorges and use the cliff mist for cover - you don't see them until they're on the bridge stones, and a troll on a bridge is a toll no caravan can pay. They've never massed like this before. Something below has them stirred up and climbing."
          choices:
            - text: "Why are they suddenly so bold?"
              action: "info"
              response: "If I knew, I'd have shot it already. Old Varric down the trail mutters about rites in the rock - fire-magic waking the deep things. All I know is what I see through the glass: more of them, every dawn, pushing for the bridges. Cull the pack hard enough and the approaches are safe again. That I can promise."
              choices:
                - text: "We'll thin the ridge for you."
                  action: "give_quest"
                  quest_id: "dragon_cliffs_troll_cull"
                - text: "Let me look around first."
                  action: "back"
            - text: "Back."
              action: "back"
        - text: "We'll clear the trolls."
          action: "give_quest"
          quest_id: "dragon_cliffs_troll_cull"
        - text: "Claim your reward"
          action: "turn_in_quest"
          quest_id: "dragon_cliffs_troll_cull"
        - text: "Leave"
          action: "leave"

  dragon_cliffs_bone_hermit:
    name: "Old Varric Bone-Speaker"
    type: "quest_giver"
    description: "A hermit draped in dragon teeth and old cliff charms"
    sprite: "dragon_cliffs_bone_hermit"
    render_category: animated
    size_class: person
    dialogue:
      greeting: "Hsh. Listen - there, under your feet. The bones remember flame, and lately the rock has begun to hum back. I have hung these dragon-teeth thirty years and never heard it sing like this. Something below has taught the mountain mages to listen. That is never a small thing."
      active_message: "The rite still hums in the rock - I feel it in my teeth and theirs. The mages yet breathe. Silence them, and the bones will rest, and so will I."
      completed_message: "The humming has stopped. The rock is only rock again. You broke the rite, and the old dead beneath us have gone quiet. Take what the bones owe you - they pay their debts, unlike the living."
      visited_message: "The dragon-bones are quiet at last. Thirty years, and finally a still night. Go well, ash-walker."
      choice_prompt: "Varric taps his dragon-bone staff against the stone."
      choices:
        - text: "What is humming in the rock?"
          action: "info"
          response: "Dragons died on these cliffs, ages before your grandmother's grandmother. Their bones are still down there, and bone that has held fire never truly forgets it. The mountain mages have found a rite to wake that memory - to make the dead embers listen, and answer. You feel it as a hum. I feel it as a wound."
          choices:
            - text: "What happens if the rite is finished?"
              action: "info"
              response: "Then the cliffs remember being a furnace. The trolls already feel it - that's why they climb, why Maera's bridges burn with raiders. Fire under the stone wakes everything that fears it. The mages performing the rite are flesh, ash-walker. Stop their breath and the hum stops with them. Will you do it?"
              choices:
                - text: "We'll silence the mages and end the rite."
                  action: "give_quest"
                  quest_id: "dragon_cliffs_ember_rites"
                - text: "Let me weigh it."
                  action: "back"
            - text: "Back."
              action: "back"
        - text: "We'll end the ember rites."
          action: "give_quest"
          quest_id: "dragon_cliffs_ember_rites"
        - text: "Claim your reward"
          action: "turn_in_quest"
          quest_id: "dragon_cliffs_ember_rites"
        - text: "Leave"
          action: "leave"

  dragon_cliffs_bone_lair:
    name: "Bone-Maw Lair"
    type: "encounter"
    description: "A cliff cave framed by fossilized dragon jaws and scattered ribs"
    sprite: "dragon_cliffs_bone_lair"
    render_category: scenery
    transparent: true
    size_tiles: 1.0
    dialogue:
      greeting: "The cave exhales a cold animal breath. Deep inside, claws scrape stone."
      visited_message: "The Bone-Maw is silent now - only scorched bones and a cold draft remain."
      choice_prompt: "Enter the Bone-Maw?"
      choices:
        - text: "Enter the lair"
          action: "combat"
        - text: "Back away"
          action: "leave"
    encounter:
      type: "dragon_lair"
      first_visit_only: true
      start_message: "A green dragon coils out of the bone-strewn dark!"
      quest_id: "dragon_cliffs_bone_lair"
      quest_name: "Bone-Maw Lair"
      quest_description: "Clear the bone-framed dragon lair in the Dragon Cliffs."
      monsters:
        - type: "dragon_green"
          count_min: 1
          count_max: 1
      rewards:
        gold: 1500
        experience: 1500
        completion_message: "The Bone-Maw falls silent."

  dragon_cliffs_ember_lair:
    name: "Ember-Heart Lair"
    type: "encounter"
    description: "A basalt dragon den split by glowing ember cracks"
    sprite: "dragon_cliffs_ember_lair"
    render_category: scenery
    transparent: true
    size_tiles: 1.0
    dialogue:
      greeting: "Heat rolls from the cave mouth. Something vast shifts behind the red glow."
      visited_message: "The Ember-Heart has cooled to black stone - the cavern lies dark and still."
      choice_prompt: "Enter the Ember-Heart?"
      choices:
        - text: "Enter the lair"
          action: "combat"
        - text: "Back away"
          action: "leave"
    encounter:
      type: "dragon_lair"
      first_visit_only: true
      start_message: "A red dragon erupts from the ember-lit cavern!"
      quest_id: "dragon_cliffs_ember_lair"
      quest_name: "Ember-Heart Lair"
      quest_description: "Clear the burning dragon lair in the Dragon Cliffs."
      monsters:
        - type: "dragon_red"
          count_min: 1
          count_max: 1
      rewards:
        gold: 2000
        experience: 1500
        completion_message: "The Ember-Heart cools to black stone."

  abandoned_church:
    name: "Abandoned Church"
    type: "encounter"
    description: "A ruined stone church whose broken doorway descends into darkness"
    sprite: "abandoned_church"
    render_category: landmark
    transparent: true
    size_tiles: 2.0
    dialogue:
      greeting: "The abandoned church stands silent among the trees. Villagers say the old priest locked the doors after the crypt bells rang by themselves, and no one who entered after dusk returned unchanged."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Enter the church"
          action: "enter_map"
          map: "church"
        - text: "Leave it alone"
          action: "leave"

  abandoned_church_exit:
    name: "Church Entrance"
    type: "encounter"
    description: "The cold doorway back to the forest"
    sprite: "church_exit"
    size_tiles: 1.0
    render_category: wall_mounted
    transparent: true
    dialogue:
      greeting: "Cold air moves through the doorway behind you. The forest path is still visible beyond the ruined arch."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Return to the forest"
          action: "enter_map"
          map: "forest"
        - text: "Stay inside"
          action: "leave"

  pyramid_entrance:
    name: "Ancient Pyramid"
    type: "encounter"
    description: "A sun-baked pyramid with a narrow stairway descending into darkness"
    sprite: "pyramid_entrance"
    render_category: scenery
    transparent: true
    size_tiles: 1.0
    dialogue:
      greeting: "The pyramid's entrance yawns open beneath worn sandstone blocks. Dry air carries the smell of dust, pitch, and something sealed too long."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Enter the pyramid"
          action: "enter_map"
          map: "pyramid_1"
        - text: "Leave it alone"
          action: "leave"

  pyramid_exit:
    name: "Pyramid Entrance"
    type: "encounter"
    description: "The stairway back out of the pyramid"
    sprite: "pyramid_stairs_up"
    render_category: wall_mounted
    transparent: true
    size_tiles: 1.0
    dialogue:
      greeting: "Warm daylight spills down the sandstone stairs behind you."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Leave the pyramid"
          action: "enter_map"
          map: "desert"
        - text: "Stay inside"
          action: "leave"

  pyramid_stairs_to_1:
    name: "Stairs to Level 1"
    type: "encounter"
    description: "Sandstone stairs leading upward"
    sprite: "pyramid_stairs_up"
    render_category: wall_mounted
    transparent: true
    size_tiles: 1.0
    dialogue:
      greeting: "The stairs climb toward the upper chambers."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Go to level 1"
          action: "enter_map"
          map: "pyramid_1"
        - text: "Stay here"
          action: "leave"

  pyramid_stairs_to_2:
    name: "Stairs to Level 2"
    type: "encounter"
    description: "Sandstone stairs leading deeper"
    sprite: "pyramid_stairs_down"
    render_category: wall_mounted
    transparent: true
    size_tiles: 1.0
    dialogue:
      greeting: "The stairs descend into a colder, darker level of the pyramid."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Go to level 2"
          action: "enter_map"
          map: "pyramid_2"
        - text: "Stay here"
          action: "leave"

  pyramid_stairs_to_3:
