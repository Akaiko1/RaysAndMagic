          action: "enter_map"
          map: "forest"
        - text: "Stay ashore"
          action: "leave"

  castle_oldman:
    name: "Shozo the Ronin"
    type: "quest_giver"
    description: "A masterless swordsman in a straw cloak, the last of a fallen eastern house, lingering at the castle gate"
    sprite: "ronin_outcast"
    render_category: animated
    size_class: person
    dialogue:
      greeting: "Stay your feet, westerner. You stand at the gate of a dead house. I am Shozo - once sworn sword to its lord, now only the man who sweeps its steps. Speak softly here. The one who sleeps above does not love to be woken... unless it is done properly."
      active_message: "Five racks remain, hidden behind the shoji screens of the upper halls. Bare every one, take up the house's steel, and his pride will do the rest."
      completed_message: "The racks stand empty, and I feel the keep breathing again - he stirs. You have done it properly, westerner. Take this, the last gift of a house with no one left to give it. Then climb. He is waiting now."
      visited_message: "He is awake. What remains between you and him is only steel, and fortune. Go with both."
      choice_prompt: "Shozo rests a hand on his sheathed katana."
      choices:
        - text: "Who sleeps in the keep above?"
          action: "info"
          response: "My lord. The Samurai Warlord. He fell defending these walls against the eastern blade, and rather than let him be taken, the temple sealed him in the high keep - armored, wrathful, and dreaming. He will not so much as stir for trespassers. Honor is the only key that fits that door."
          choices:
            - text: "Then how does one wake him?"
              action: "info"
              response: "His guard, in their last hour, hid the house's five katana racks behind the paper screens of the upper halls - so no looter could ever claim the blades and shame the house. Find all five. Take up the castle's own steel as your own. THAT he will not abide - a stranger bearing his soldiers' swords. His pride will drag him from sleep. Then, and only then, may you face him."
              choices:
                - text: "I will bare the five racks."
                  action: "give_quest"
                  quest_id: "castle_armory"
                - text: "A grave thing. Let me consider."
                  action: "back"
            - text: "Why not let him sleep?"
              action: "info"
              response: "Because a sleeping wrath is still a wrath. Travelers vanish on this road. The temple's seal weakens with every year I grow older, and when I am gone there will be no one to keep the gate. Better he is faced now, by living hands, than loosed later upon a road that has forgotten him."
              choices:
                - text: "Then back to how he wakes."
                  action: "back"
        - text: "And who are you, truly?"
          action: "info"
          response: "A ronin. A sword without a master - the lowest thing my people name. When my lord fell I should have followed him in death, as custom demands. Instead I stayed, to sweep these steps and warn the foolish. Call it cowardice. I call it the last duty no one assigned me."
          choices:
            - text: "There's honor in that. Go on."
              action: "back"
        - text: "I will wake your lord and end him."
          action: "give_quest"
          quest_id: "castle_armory"
        - text: "Claim your reward"
          action: "turn_in_quest"
          quest_id: "castle_armory"
        - text: "Leave"
          action: "leave"

