        - text: "A proper duel"
          action: "start_arena_duel"
          tier: "normal"
        - text: "An impossible match"
          action: "start_arena_duel"
          tier: "impossible"
        - text: "Not yet"
          action: "leave"

  # Portcullis barring a chamber doorway while a duel champion lives on the map.
  # render_category "door": stands ACROSS the opening (oriented by the flanking
  # walls), draws + blocks only while closed.
  arena_gate:
    name: "Arena Portcullis"
    type: "encounter"
    description: "A spiked iron portcullis between stone pillars"
    sprite: "arena_gate"
    render_category: door
    transparent: true
    size_tiles: 1.0
    dialogue:
      greeting: "The portcullis is bolted down. Beyond the bars, the duel must end before it rises."
      choice_prompt: "What do you do?"
      choices:
        - text: "Step back"
          action: "leave"

  # Way back out of the arena: a barred gate wall standee on the west chamber wall.
  arena_exit:
    name: "Arena Gates"
    type: "encounter"
    description: "The barred gateway back out to the desert"
    sprite: "arena_gate_wall"
    render_category: wall_mounted
    transparent: true
    size_tiles: 1.0
    dialogue:
      greeting: "Beyond the barred gateway, the desert glare waits."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Return to the desert"
          action: "enter_map"
          map: "desert"
        - text: "Stay"
          action: "leave"

  # Fallen-fighter remains half-buried in the sand.
  arena_bones:
    name: "Bleached Bones"
    type: "encounter"
    description: "A gladiator's remains - helm, shield and bones half-swallowed by the sand"
    sprite: "arena_bones"
    render_category: scenery
    transparent: true
    size_tiles: 0.4
    dialogue:
      greeting: "A cracked helm and a split shield lie among bleached bones. The sand keeps its victors and its fallen alike."
