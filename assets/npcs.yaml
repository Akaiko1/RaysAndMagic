# UgaTaima NPC Configuration
#
# NPC TYPES:
# - spell_trader: Teaches spells to party members for gold
# - skill_trainer: Trains skills (already implemented in code)
# - merchant: Sells items
# - quest_giver: Gives quests
#
# PLACEMENT FORMAT:
# Use [npc:key] in map files to place NPCs
# The key corresponds to an NPC definition in this file

npcs:
  # Spell Traders - NPCs who teach spells for gold
  spell_trader_mage:
    name: "Mystic Trader Eldrich"
    type: "spell_trader"
    description: "A mysterious mage who trades arcane knowledge for gold"
    sprite: "elf_warrior"
    size_multiplier: 4
    dialogue:
      greeting: "Greetings, traveler! I deal in magical knowledge. Choose a character and spell to learn."
      insufficient_gold: "You need %d gold to learn this spell."
      already_known: "%s already knows this spell."
      success: "The knowledge flows into %s's mind. Use it wisely!"

    # Spells this NPC can teach
    spells:
      walk_on_water:
        name: "Walk on Water"
        school: "water"
        cost: 1000
        description: "Allows the party to walk across water surfaces for a limited time"
        requirements:
          min_level: 3
          schools:
            - school: "water"
              min_level: 1

      water_breathing:
        name: "Water Breathing"
        school: "water"
        cost: 1500
        description: "Allows underwater exploration for extended periods"
        requirements:
          min_level: 5
          schools:
            - school: "water"
              min_level: 2

  # Spell trader for testing
  mtrader0:
    name: "Mystic Trader Aldric"
    type: "spell_trader"
    description: "A wise old mage who trades in magical knowledge"
    sprite: "human"
    size_multiplier: 4
    dialogue:
      greeting: "Greetings, traveler! I possess ancient spells for those with coin."
      insufficient_gold: "You lack the gold required for this knowledge."
      already_known: "This character already knows that spell."
      success: "The magical knowledge has been imparted. Use it wisely!"
    spells:
      walk_on_water:
        name: "Walk on Water"
        school: "water"
        cost: 1000
        description: "Allows the caster to walk on water surfaces for a limited time."
        requirements:
          min_level: 3
          schools:
            - school: "water"
              min_level: 1

  # Example of other NPC types for future expansion
  merchant_general:
    name: "Trader Marcus"
    type: "merchant"
    description: "A general goods merchant with basic supplies"
    sprite: "elf"
    size_multiplier: 4
    dialogue:
      greeting: "Welcome to my shop! What can I get for you today?"
    inventory:
      - type: "potion"
        name: "Health Potion"
        cost: 50
        quantity: 10
      - type: "weapon"
        name: "Iron Sword"
        cost: 200
        quantity: 3

  desert_merchant:
    name: "Sahim the Wayfarer"
    type: "merchant"
    description: "A desert trader with a keen eye for useful gear"
    sprite: "merchant"
    size_multiplier: 4
    sell_available: true
    dialogue:
      greeting: "Spare tools and trinkets? I pay fair coin."

  quest_elder:
    name: "Village Elder Aldwin"
    type: "quest_giver"
    description: "The wise village elder with knowledge of ancient secrets"
    sprite: "elf_warrior"
    dialogue:
      greeting: "Young adventurer, I have a task that requires your skills..."

  shipwreck_bandit_camp:
    name: "Abandoned Shipwreck"
    type: "encounter"
    description: "An old shipwreck that appears abandoned, but sounds come from within"
    sprite: "shipwreck"
    render_type: "environment_sprite"
    transparent: true
    dialogue:
      greeting: "You approach an old shipwreck half-buried in the ground. Through gaps in the rotted hull, you hear voices and see flickering firelight. It seems bandits have made this wreck their hideout."
      visited_message: "The shipwreck appears empty now."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Leave quietly"
          action: "leave"
        - text: "Attack the bandits"
          action: "combat"
    encounter:
      type: "bandit_camp"
      start_message: "Bandits emerge from the shipwreck to attack!"
      quest_id: "shipwreck_bandits"
      quest_name: "Clear the Shipwreck"
      quest_description: "Bandits have made a hideout in an old shipwreck. Defeat them all to claim the bounty."
      monsters:
        - type: "bandit"
          count_min: 2
          count_max: 5
      rewards:
        gold: 2000
        experience: 500
        completion_message: "The shipwreck bandits have been defeated!"
      first_visit_only: true

  abandoned_church:
    name: "Abandoned Church"
    type: "encounter"
    description: "A ruined stone church whose broken doorway descends into darkness"
    sprite: "abandoned_church"
    render_type: "environment_sprite"
    transparent: true
    dialogue:
      greeting: "The abandoned church stands silent among the trees. Villagers say the old priest locked the doors after the crypt bells rang by themselves, and no one who entered after dusk returned unchanged."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Enter the church"
          action: "enter_map"
          map: "church"
        - text: "Leave it alone"
          action: "leave"

  abandoned_church_exit:
    name: "Church Entrance"
    type: "encounter"
    description: "The cold doorway back to the forest"
    sprite: "church_exit"
    render_type: "environment_sprite"
    transparent: true
    dialogue:
      greeting: "Cold air moves through the doorway behind you. The forest path is still visible beyond the ruined arch."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Return to the forest"
          action: "enter_map"
          map: "forest"
        - text: "Stay inside"
          action: "leave"

  seabright_gate:
    name: "Seabright Gate"
    type: "encounter"
    description: "A stone road gate leading toward the sea city of Seabright"
    sprite: "city_exterior"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 6
    dialogue:
      greeting: "Beyond the forest road, Seabright's gate stands open. You hear gulls, market bells, and the sea wind beyond the arch."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Enter Seabright"
          action: "enter_map"
          map: "city"
        - text: "Stay in the forest"
          action: "leave"

  city_exit:
    name: "City Gate"
    type: "encounter"
    description: "The main gate back to the forest road"
    sprite: "city_gate"
    render_type: "environment_sprite"
    transparent: true
    size_multiplier: 4
    dialogue:
      greeting: "The gate opens back onto the forest path."
      choice_prompt: "What do you want to do?"
      choices:
        - text: "Return to the forest"
          action: "enter_map"
          map: "forest"
        - text: "Stay in Seabright"
          action: "leave"

  city_weapon_shop:
    name: "Seabright Arms"
    type: "merchant"
    description: "A weapon shop with upgraded blades, bows and staves"
    sprite: "merchant"
    size_multiplier: 4
    sell_available: true
    dialogue:
      greeting: "Starter steel won't last the road. These will."
    # Stock is one class-appropriate upgrade above the starter loadout —
    # nothing here matches an item the party already carries at L1.
    inventory:
      - type: "weapon"
        name: "Silver Sword"
        cost: 800
        quantity: 2
      - type: "weapon"
        name: "Steel Mace"
        cost: 550
        quantity: 2
      - type: "weapon"
        name: "Battle Staff"
        cost: 400
        quantity: 2
      - type: "weapon"
        name: "Elven Bow"
        cost: 750
        quantity: 1
      - type: "weapon"
        name: "Throwing Knife"
        cost: 200
        quantity: 3

  city_potion_shop:
    name: "Harbor Remedies"
    type: "merchant"
    description: "A small apothecary selling road medicine"
    sprite: "merchant"
    size_multiplier: 4
    sell_available: true
    dialogue:
      greeting: "Careful bottles, clear labels, no mystery brews."
    inventory:
      - type: "potion"
        name: "Health Potion"
        cost: 50
        quantity: 12
      - type: "potion"
        name: "Revival Potion"
        cost: 500
        quantity: 3

  city_spell_shop:
    name: "Tideglass Scriptorium"
    type: "spell_trader"
    description: "A spell shop whose windows overlook the harbor"
    sprite: "elf_warrior"
    size_multiplier: 4
    dialogue:
      greeting: "Ink, salt, and spellwork. Choose a character and a spell."
      insufficient_gold: "You need %d gold for this spell."
      already_known: "%s already knows this spell."
      success: "%s learned the spell."
    spells:
      firebolt:
        name: "Fire Bolt"
        school: "fire"
        cost: 300
        description: "Launches a small, fast bolt of fire."
        requirements:
          schools:
            - school: "fire"
              min_level: 1
      torch_light:
        name: "Torch Light"
        school: "fire"
        cost: 150
        description: "Creates a magical light that illuminates the surroundings."
        requirements:
          schools:
            - school: "fire"
              min_level: 1
      ice_bolt:
        name: "Ice Bolt"
        school: "water"
        cost: 350
        description: "Launches a chilling bolt of ice."
        requirements:
          schools:
            - school: "water"
              min_level: 1
      heal:
        name: "Heal"
        school: "body"
        cost: 500
        description: "Restores health to another party member."
        requirements:
          schools:
            - school: "body"
              min_level: 2
      bless:
        name: "Bless"
        school: "spirit"
        cost: 700
        description: "Blesses the party with divine protection."
        requirements:
          schools:
            - school: "spirit"
              min_level: 2
      walk_on_water:
        name: "Walk on Water"
        school: "water"
        cost: 1000
        description: "Allows the party to walk across water surfaces."
        requirements:
          min_level: 3
          schools:
            - school: "water"
              min_level: 1
      water_breathing:
        name: "Water Breathing"
        school: "water"
        cost: 1500
        description: "Allows underwater exploration for extended periods."
        requirements:
          min_level: 5
          schools:
            - school: "water"
              min_level: 2

  city_mastery_trainer:
    name: "Master Ilyra"
    type: "skill_trainer"
    description: "A city trainer who sharpens known skills and magic schools"
    sprite: "elf"
    size_multiplier: 4
    dialogue:
      greeting: "I train discipline, not wishes. Pick a character and a known mastery to improve."
