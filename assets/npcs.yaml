      greeting: "Daylight filters down through the outflow grate - the way back up to Seabright."
      choice_prompt: "Leave the culverts?"
      choices:
        - text: "Climb back to Seabright"
          action: "enter_map"
          map: "city"
        - text: "Stay below"
          action: "leave"

  culverts_oldman:
    name: "Grist the Sluice-Rat"
    type: "quest_giver"
    description: "A cloaked ratfolk who keeps the Seabright culverts and their seven sluice valves, lantern always lit"
    sprite: "ratman_cloak"
    render_category: animated
    size_class: person
    dialogue:
      greeting: "Hsss - easy, top-dweller. Grist means no harm. I keep these culverts; have, since before your harbor learned to count its coin. Lower that steel and I'll tell you what glitters down here in the dark."
      active_message: "Still seven valves gushing, friend. Wheel them all shut and the bug's hall drains to mud - then it's nowhere left to skitter."
      completed_message: "I hear it now - the channels run dry, and something gold-shelled scratches at the bottom of its own hall with no water left to flee through. You did the trick. Take Grist's thanks, and the harbor's."
      visited_message: "Dry as a picked bone down there now. Mind its bite, top-dweller - gold or no, it's still got pincers."
      choice_prompt: "Grist's whiskers twitch toward the dark."
      choices:
        - text: "What glitters down here? (ask Grist)"
          action: "info"
          response: "The Golden Thief Bug. Big as a hound, shell like minted coin, and it hoards - drags every dropped ring and lost crown down into its flooded hall. Trouble is, it won't fight fair. Close on it and it just... blinks. Gone. Three strides off, watching you with those black eyes."
          choices:
            - text: "So how do you corner a thing that vanishes?"
              action: "info"
              response: "You take its water. Seven sluice valves feed the flood that fills its hall - that's how it slips away, swimming the channels quicker than you can blink after it. Wheel all seven shut and the hall drains to bare stone. No water, no escape. Cornered in the dry, it finally turns and bites. That's when you've got it."
              choices:
                - text: "Then I'll shut all seven valves."
                  action: "give_quest"
                  quest_id: "culverts_valves"
                - text: "Let me think on it."
                  action: "back"
            - text: "Hm. Tell me the rest later."
              action: "back"
        - text: "Why does a rat keep the harbor's drains?"
          action: "info"
          response: "Ha! Because no top-dweller will. Grist's kind were here when Seabright was three huts and a fishing weir. We mind the valves, we keep the floods off your cellars, and your sort pretends we don't exist. Suits us both. The bug, though - the bug's been eating our quiet. I'd be glad to see it gone."
          choices:
            - text: "Fair enough. Back to the bug."
              action: "back"
        - text: "I'll drain its lair for you."
          action: "give_quest"
          quest_id: "culverts_valves"
        - text: "Claim your reward"
          action: "turn_in_quest"
          quest_id: "culverts_valves"
        - text: "Leave"
          action: "leave"

  # Seven sluice valves. Distinct keys/names so each remembers being shut
