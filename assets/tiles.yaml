tiles:
  # Basic terrain types
  empty:
    name: "Empty Space"
    type: "floor"
    solid: false
    transparent: true
    walkable: true
    sprite: ""
    render_type: "floor_only"
    # No floor_color on purpose: empty ground is tinted per-map by
    # default_floor_color (map_configs.yaml); a color here is never read.
    floor_texture_group: "default"  # overridden to "beach" near water at runtime
    letter: "."

  wall:
    name: "Stone Wall"
    type: "wall"
    solid: true
    transparent: false
    walkable: false
    wall_height_multiplier: 1.0
    sprite: ""
    render_type: "textured_wall"
    wall_color: [64, 64, 64]  # Gray stone wall
    letter: "#"

  water:
    name: "Water"
    type: "water"
    solid: false
    transparent: true
    walkable: false
    sprite: ""
    render_type: "floor_only"
    floor_color: [100, 150, 255]  # Blue water
    floor_near_color: [205, 175, 149]  # Sandy shore near water
    floor_texture_group: "water"
    letter: "W"

  deep_water:
    name: "Deep Water"
    type: "water"
    solid: false
    transparent: true
    walkable: false
    sprite: ""
    render_type: "floor_only"
    floor_color: [30, 80, 180]  # Darker blue deep water
    floor_near_color: [205, 175, 149]  # Sandy shore near deep water
    floor_texture_group: "water"
    letter: "Q"

  door:
    name: "Door"
    type: "wall"
    solid: true
    transparent: false
    walkable: false  # Can be changed to true when opened
    wall_height_multiplier: 1.0
    sprite: "forest_gate"
    render_type: "textured_wall"
    wall_color: [139, 69, 19]  # Brown wooden door
    letter: "D"

  # Natural features - Trees (Forest biome)
  tree:
    name: "Forest Tree"
    type: "nature"
    solid: true
    transparent: false
    walkable: false
    size_tiles: 2.0
    sprite: "forest_oak"
    render_type: "tree_sprite"
    map_color: [101, 67, 33]  # Brown tree bark
    floor_near_color: [20, 90, 20]  # Dark green near trees
    letter: "T"
    biomes: ["forest"]

  ancient_tree:
    name: "Ancient Tree"
    type: "nature"
    solid: true
    transparent: false
    walkable: false
    size_tiles: 2.0
    sprite: "old_platan"
    render_type: "tree_sprite"
    map_color: [69, 39, 19]  # Darker brown ancient bark
    floor_near_color: [20, 90, 20]  # Dark green near trees
    letter: "A"
    biomes: ["forest"]

