  # Off-map backdrop: GetTileAt returns this for out-of-bounds instead of the
  # (empty-sprite, gray, per-frame-regenerated) stone wall. Rendered as a normal
  # textured wall (like thicket) so the sprite is cached - no lag - and shows a
  # sea horizon behind the map's tree/dune border. Not placeable (no letter).
